apiVersion: v1
kind: ServiceAccount
metadata:
  name: qaroom-prometheus
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: qaroom-prometheus
rules:
  - apiGroups: [""]
    resources: [pods, nodes, services, endpoints]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: qaroom-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: qaroom-prometheus
subjects:
  - kind: ServiceAccount
    name: qaroom-prometheus
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qaroom-prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      # Service metrics surface via the OTel Collector's prometheus exporter.
      - job_name: otel-collector
        static_configs:
          - targets: ['qaroom-otel-collector.observability.svc.cluster.local:8889']
      # Per-service /metrics, scraped by pod annotation (active once metrics.enabled).
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [qaroom]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qaroom-prometheus
  namespace: observability
  labels:
    qaroom.io/observability: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      qaroom.io/observability: prometheus
  template:
    metadata:
      labels:
        qaroom.io/observability: prometheus
    spec:
      serviceAccountName: qaroom-prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.12.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - { name: http, containerPort: 9090 }
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
      volumes:
        - name: config
          configMap:
            name: qaroom-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: qaroom-prometheus
  namespace: observability
spec:
  selector:
    qaroom.io/observability: prometheus
  ports:
    - { name: http, port: 9090, targetPort: 9090 }
