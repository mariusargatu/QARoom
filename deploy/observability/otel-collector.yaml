apiVersion: v1
kind: ConfigMap
metadata:
  name: qaroom-otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      # Cap the collector's own heap so a flapping downstream (jaeger/tracetest) can never grow
      # the export queue into an OOMKill — it refuses/drops data above the soft limit instead.
      # Must run FIRST in every pipeline. Percentages are of the container memory limit below.
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      # Defense-in-depth: scrub known-PII span attributes before export, so no email/body reaches a
      # trace store even if a service stamps one (ADR-0034). The in-process PiiLeakProbe is the
      # falsifiable seam (CHAOS_SPAN_PII) and scripts/check-pii-spans.ts is the live audit; this is the
      # standing guard. Keys mirror PII_ATTR_DENYLIST in packages/otel/src/pii.ts (the audit's source).
      attributes/redact-pii:
        actions:
          - { key: user.email, action: delete }
          - { key: email, action: delete }
          - { key: user.name, action: delete }
          - { key: user.phone, action: delete }
          - { key: phone, action: delete }
          - { key: post.body, action: delete }
          - { key: comment.body, action: delete }
          - { key: message.body, action: delete }
          - { key: content.body, action: delete }
          - { key: http.request.body, action: delete }
      batch: {}
    exporters:
      # Jaeger v2 ingests OTLP natively on 4317. Bounded queue + capped retry so a jaeger
      # restart sheds spans instead of accumulating them unbounded in the collector.
      otlp/jaeger:
        endpoint: qaroom-jaeger.observability.svc.cluster.local:4317
        tls:
          insecure: true
        sending_queue:
          enabled: true
          queue_size: 2000
        retry_on_failure:
          enabled: true
          max_elapsed_time: 30s
      # Dual-export traces to Tracetest's own OTLP ingest (trace-based testing reads
      # the same spans Jaeger sees). Tracetest's otlp DataStore listens on 4317.
      otlp/tracetest:
        endpoint: qaroom-tracetest.observability.svc.cluster.local:4317
        tls:
          insecure: true
        sending_queue:
          enabled: true
          queue_size: 2000
        retry_on_failure:
          enabled: true
          max_elapsed_time: 30s
      # Prometheus scrapes the collector here (service metrics surface via this exporter).
      prometheus:
        endpoint: 0.0.0.0:8889
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, attributes/redact-pii, batch]
          exporters: [otlp/jaeger, otlp/tracetest, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qaroom-otel-collector
  namespace: observability
  labels:
    qaroom.io/observability: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      qaroom.io/observability: otel-collector
  template:
    metadata:
      labels:
        qaroom.io/observability: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.153.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: prom, containerPort: 8889 }
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
      volumes:
        - name: config
          configMap:
            name: qaroom-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: qaroom-otel-collector
  namespace: observability
spec:
  selector:
    qaroom.io/observability: otel-collector
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: prom, port: 8889, targetPort: 8889 }
