apiVersion: v1
kind: ConfigMap
metadata:
  name: qaroom-otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      # Jaeger v2 ingests OTLP natively on 4317.
      otlp/jaeger:
        endpoint: qaroom-jaeger.observability.svc.cluster.local:4317
        tls:
          insecure: true
      # Prometheus scrapes the collector here (service metrics surface via this exporter).
      prometheus:
        endpoint: 0.0.0.0:8889
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/jaeger, debug]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qaroom-otel-collector
  namespace: observability
  labels:
    qaroom.io/observability: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      qaroom.io/observability: otel-collector
  template:
    metadata:
      labels:
        qaroom.io/observability: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.153.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: prom, containerPort: 8889 }
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
      volumes:
        - name: config
          configMap:
            name: qaroom-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: qaroom-otel-collector
  namespace: observability
spec:
  selector:
    qaroom.io/observability: otel-collector
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: prom, port: 8889, targetPort: 8889 }
