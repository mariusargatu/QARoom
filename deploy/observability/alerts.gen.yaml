# Generated by `pnpm alerts:gen` from packages/contracts/src/slos.ts — do not edit by hand.
# Every threshold derives from SLO_TARGETS + CONSUMER_LAG_SLO (the single source); `pnpm test:scripts`
# fails the build if this drifts. promtool tests: deploy/observability/alerts.test.yaml.
groups:
  - name: qaroom-http-slo
    rules:
      - alert: HighErrorRateCreatePost
        expr: 'sum(rate(http_server_request_duration_seconds_count{http_route="/api/communities/{id}/posts",http_response_status_code=~"5.."}[5m])) / sum(rate(http_server_request_duration_seconds_count{http_route="/api/communities/{id}/posts"}[5m])) > 0.005'
        for: 5m
        labels:
          severity: warning
          slo: createPost
        annotations:
          summary: 'createPost error rate over its SLO (0.005)'
          runbook: 'docs/slos.md'
      - alert: HighLatencyP95CreatePost
        expr: 'histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket{http_route="/api/communities/{id}/posts"}[5m]))) > 0.2'
        for: 5m
        labels:
          severity: warning
          slo: createPost
        annotations:
          summary: 'createPost p95 latency over its SLO (0.2s)'
          runbook: 'docs/slos.md'
      - alert: HighErrorRateFeed
        expr: 'sum(rate(http_server_request_duration_seconds_count{http_route="/api/communities/{id}/feed",http_response_status_code=~"5.."}[5m])) / sum(rate(http_server_request_duration_seconds_count{http_route="/api/communities/{id}/feed"}[5m])) > 0.001'
        for: 5m
        labels:
          severity: warning
          slo: feed
        annotations:
          summary: 'feed error rate over its SLO (0.001)'
          runbook: 'docs/slos.md'
      - alert: HighLatencyP95Feed
        expr: 'histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket{http_route="/api/communities/{id}/feed"}[5m]))) > 0.1'
        for: 5m
        labels:
          severity: warning
          slo: feed
        annotations:
          summary: 'feed p95 latency over its SLO (0.1s)'
          runbook: 'docs/slos.md'
  - name: qaroom-async-slo
    rules:
      - alert: ConsumerLagPendingHigh
        expr: 'qaroom_consumer_num_pending > 1000'
        for: 1m
        labels:
          severity: warning
          slo: consumer-lag
        annotations:
          summary: 'durable {{ $labels.durable }} num_pending over the CONSUMER_LAG_SLO maxPending (1000)'
          runbook: 'docs/slos.md'
      - alert: ConsumerLagAckAgeHigh
        expr: 'qaroom_consumer_oldest_unacked_age_seconds > 30'
        for: 1m
        labels:
          severity: warning
          slo: consumer-lag
        annotations:
          summary: 'durable {{ $labels.durable }} oldest-unacked age over the CONSUMER_LAG_SLO maxAckAgeMs (30s)'
          runbook: 'docs/slos.md'
