# The gc-dedup CronJob is no longer a standalone manifest. It is now generated by the shared
# qaroom-service chart (packages/helm-template/templates/gc-cronjob.yaml) for EVERY service that
# has the messaging substrate — ONE values-driven shape (DB isolation preserved), not a per-service
# copy. Enable it per service in deploy/<service>/values.yaml:
#
#   gc:
#     enabled: true
#     package: "@qaroom/<service>"
#     image: qaroom/<service>-gc   # optional: restart-free alias for live Tilt
#
# content keeps using its dedicated restart-free `qaroom/content-gc` image (built in the Tiltfile)
# via deploy/content/values.yaml. This file is intentionally objectless; the Tiltfile's
# `k8s_yaml('deploy/observability/gc-dedup-cronjob.yaml')` line can be dropped by the Tiltfile owner.
