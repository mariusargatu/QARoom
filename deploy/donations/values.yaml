image:
  repository: qaroom/donations
service:
  port: 80
  targetPort: 8084
container:
  port: 8084
otel:
  serviceName: donations
postgres:
  enabled: true
  database: qaroom_donations
extraEnv:
  # NATS: publishes donation.state.changed, consumes flag.state.changed (gating cache).
  NATS_URL: nats://qaroom-nats.observability.svc.cluster.local:4222
  # The (Microcks-mocked) payment provider, served from payment-provider.openapi.yaml. Microcks mock
  # URLs encode service-name spaces as %20 (NOT `+`, which is a literal plus in a URL path) and keep
  # parens LITERAL (NOT %28/%29) — the `+`/`%28` form 404s every charge → donations 502 (the long-
  # standing payment-mock bug). Verified: this exact path returns 200 {"status":"captured"}.
  PAYMENT_PROVIDER_BASE_URL: "http://qaroom-microcks.observability.svc.cluster.local:8080/rest/QARoom%20Payment%20Provider%20(mock)/1.0.0"
gc:
  enabled: true
  package: "@qaroom/donations"
  # Restart-free alias of donations' image (built plain in the Tiltfile), so Tilt's
  # docker_build_with_restart cannot clobber the CronJob command into the dev-server boot.
  image: qaroom/donations-gc
