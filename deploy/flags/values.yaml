image:
  repository: qaroom/flags
service:
  port: 80
  targetPort: 8083
container:
  port: 8083
otel:
  serviceName: flags
postgres:
  enabled: true
  database: qaroom_flags
extraEnv:
  # Async messaging (Milestone 5): NATS JetStream — flags publishes flag.state.changed.
  NATS_URL: nats://qaroom-nats.observability.svc.cluster.local:4222
gc:
  enabled: true
  package: "@qaroom/flags"
  # image defaults to qaroom/flags. For live Tilt, add a restart-free `qaroom/flags-gc`
  # alias (Tiltfile) and set it here so docker_build_with_restart does not clobber `command`.
