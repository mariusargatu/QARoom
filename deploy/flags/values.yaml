image:
  repository: qaroom/flags
service:
  port: 80
  targetPort: 8083
container:
  port: 8083
otel:
  serviceName: flags
postgres:
  enabled: true
  database: qaroom_flags
extraEnv:
  # Async messaging (Milestone 5): NATS JetStream — flags publishes flag.state.changed.
  NATS_URL: nats://qaroom-nats.observability.svc.cluster.local:4222
gc:
  enabled: true
  package: "@qaroom/flags"
  # Restart-free alias of flags' image (built plain in the Tiltfile), so Tilt's
  # docker_build_with_restart cannot clobber the CronJob command into the dev-server boot.
  image: qaroom/flags-gc
