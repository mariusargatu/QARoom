image:
  repository: qaroom/moderator-agent
service:
  port: 80
  targetPort: 8086
container:
  port: 8086
otel:
  serviceName: moderator-agent
postgres:
  enabled: true
  # pgvector image — the moderator's knowledge base needs the `vector` type + `CREATE EXTENSION`.
  image: pgvector/pgvector:pg18
  database: qaroom_moderator
extraEnv:
  # NATS: subscribes to qaroom.content.posts.*.created, publishes moderation.decision.recorded.
  NATS_URL: nats://qaroom-nats.observability.svc.cluster.local:4222
  # The pinned OpenAI model (ADR-0018). The API key is injected at deploy time (helm --set
  # extraEnv.OPENAI_API_KEY=… or a Secret); empty boots fine — /health and /ready need no LLM call,
  # the key is only used when classifying a post. Dev-only plaintext posture, like postgres.password (ADR-0009).
  OPENAI_API_KEY: ""
  # LangChain provider-prefixed id (ADR-0017/0018). Reasoning model — effort set in config default.
  # gpt-5-nano: cost-effective draft model; the deterministic self-check (incl. the
  # never-confidently-approve-flagged guard) keeps it safe (evals/model_compare.py).
  MODERATOR_MODEL: openai:gpt-5-nano-2025-08-07
  # Dev/demo: enable the POST /review trigger so `scripts/seed-moderation.sh` can drive a review
  # on demand and populate Langfuse end-to-end. Production still sets this false (NATS-only, ADR-0018).
  MODERATOR_ENABLE_MANUAL_REVIEW: "true"
  # Langfuse LLM-trace UI (spike). In-cluster web endpoint + the dev API keys seeded headlessly by
  # deploy/observability/langfuse.yaml (LANGFUSE_INIT_*). When set, the moderator auto-instruments
  # LangChain/LangGraph (OpenInference) and exports the trajectory/retrieval/generations to Langfuse.
  # The image ships the `tracing` dependency group (Dockerfile). Dev-only plaintext (ADR-0009).
  LANGFUSE_HOST: http://qaroom-langfuse-web.observability.svc.cluster.local:3000
  LANGFUSE_PUBLIC_KEY: pk-lf-qaroom-dev
  LANGFUSE_SECRET_KEY: sk-lf-qaroom-dev
