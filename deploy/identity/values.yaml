image:
  repository: qaroom/identity
service:
  port: 80
  targetPort: 8082
container:
  port: 8082
otel:
  serviceName: identity
postgres:
  enabled: true
  database: qaroom_identity
gc:
  enabled: true
  package: "@qaroom/identity"
  # identity has neither outbox nor processed_events; the job sweeps idempotency_responses only.
  # image defaults to qaroom/identity. For live Tilt, add a restart-free `qaroom/identity-gc` alias.
