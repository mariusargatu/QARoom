image:
  repository: qaroom/identity
service:
  port: 80
  targetPort: 8082
container:
  port: 8082
otel:
  serviceName: identity
postgres:
  enabled: true
  database: qaroom_identity
extraEnv:
  # Async messaging: identity became a NATS producer in Milestone 13 (the GDPR erasure saga,
  # ADR-0036) — server.ts connects to JetStream to drain its outbox. Without this it falls back to
  # nats://localhost:4222 and crash-loops in-cluster (in-proc tests don't exercise this boot path).
  NATS_URL: nats://qaroom-nats.observability.svc.cluster.local:4222
gc:
  enabled: true
  package: "@qaroom/identity"
  # identity has neither outbox nor processed_events; the job sweeps idempotency_responses only.
  # Restart-free alias of identity's image (built plain in the Tiltfile), so Tilt's
  # docker_build_with_restart cannot clobber the CronJob command into the dev-server boot.
  image: qaroom/identity-gc
