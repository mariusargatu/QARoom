image:
  repository: qaroom/identity
service:
  port: 80
  targetPort: 8082
container:
  port: 8082
otel:
  serviceName: identity
postgres:
  enabled: true
  database: qaroom_identity
gc:
  enabled: true
  package: "@qaroom/identity"
  # identity has neither outbox nor processed_events; the job sweeps idempotency_responses only.
  # Restart-free alias of identity's image (built plain in the Tiltfile), so Tilt's
  # docker_build_with_restart cannot clobber the CronJob command into the dev-server boot.
  image: qaroom/identity-gc
