image:
  repository: qaroom/webhooks
service:
  port: 80
  targetPort: 8087
container:
  port: 8087
otel:
  serviceName: webhooks
postgres:
  enabled: true
  database: qaroom_webhooks
extraEnv:
  # NATS: consumes all five QARoom event channels; publishes nothing (ADR-0019).
  NATS_URL: nats://qaroom-nats.observability.svc.cluster.local:4222
  # SSRF posture + retry-contract knobs.
  WEBHOOKS_DELIVERY_TIMEOUT_MS: "5000"
gc:
  enabled: true
  package: "@qaroom/webhooks"
  # No outbox (publishes nothing, ADR-0019); the job sweeps processed_events + idempotency_responses.
  # webhook_deliveries is deliberately retained (audit ledger) — see the job entrypoint.
  # Restart-free alias of webhooks' image (built plain in the Tiltfile), so Tilt's
  # docker_build_with_restart cannot clobber the CronJob command into the dev-server boot.
  image: qaroom/webhooks-gc
