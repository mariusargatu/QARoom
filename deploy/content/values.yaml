image:
  # Bare name — Tilt's default_registry rewrites to the k3d registry; CI uses kind load.
  repository: qaroom/content
service:
  port: 80
  targetPort: 8081
container:
  port: 8081
otel:
  serviceName: content
postgres:
  enabled: true
  database: qaroom_content
extraEnv:
  # Async messaging (Milestone 4): NATS JetStream client connection.
  NATS_URL: nats://qaroom-nats.observability.svc.cluster.local:4222
gc:
  enabled: true
  package: "@qaroom/content"
  # Restart-free alias of content's image (built plain in the Tiltfile), so Tilt's
  # docker_build_with_restart cannot clobber the CronJob command.
  image: qaroom/content-gc
