# Shared qaroom-service chart values. Each service overrides via deploy/<service>/values.yaml.
nameOverride: ""

image:
  # Bare name — Tilt's default_registry rewrites to the k3d registry locally; CI uses
  # `kind load` + pullPolicy=Never. Never a remote pull.
  repository: qaroom/content
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  # Container port the Service forwards to. The deliberate-broken-value smoke demo
  # sets this to a port nothing listens on (e.g. 9999) → /health fails.
  targetPort: 8081

container:
  port: 8081

# NODE_ENV=production turns the OTel SDK on (it is a no-op only under NODE_ENV=test).
nodeEnv: production

# DATABASE_URL. Leave empty for a service with no DB (gateway). When postgres.enabled,
# the _helpers.tpl databaseUrl builds the in-cluster DSN and this is ignored.
database:
  url: ""

otel:
  enabled: true
  endpoint: http://qaroom-otel-collector.observability.svc.cluster.local:4318
  protocol: http/protobuf
  serviceName: "" # defaults to the release name
  semconvOptIn: gen_ai_latest_experimental
  resourceAttributes: "service.namespace=qaroom,deployment.environment=local"

# Arbitrary extra env (e.g. gateway's CONTENT_BASE_URL).
extraEnv: {}

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 3
    periodSeconds: 10
    failureThreshold: 6
  readiness:
    path: /ready
    initialDelaySeconds: 2
    periodSeconds: 5
    failureThreshold: 6

# Per-service TTL GC CronJob for the messaging substrate (aged published outbox rows + the
# dedup tables). OFF by default; each service that has the messaging tables enables it in
# deploy/<service>/values.yaml. DB isolation: the CronJob targets the service's own Postgres
# via the same databaseUrl helper the Deployment uses.
gc:
  enabled: false
  # The pnpm workspace package whose src/jobs/gc-dedup.ts runs (e.g. "@qaroom/content").
  package: ""
  # Image override; empty falls back to image.repository. Set a restart-free `-gc` alias
  # under Tilt so docker_build_with_restart does not clobber the CronJob command.
  image: ""
  schedule: "0 * * * *"
  backoffLimit: 1
  # Caps a hung job's lifetime so concurrencyPolicy: Forbid cannot deadlock the schedule forever
  # (the real sweep takes seconds; 600s only fires on a genuinely stuck job).
  activeDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: "500m", memory: 256Mi }

# Prometheus pod-annotation scrape (off until per-service /metrics ships; the Collector's
# prometheus exporter is the current metrics source).
metrics:
  enabled: false
  path: /metrics

serviceAccount:
  create: true
  name: ""

# Pod/container hardening for our own images (deployment.yaml, gc-cronjob.yaml — see _helpers.tpl).
# 10001 is an arbitrary high UID/GID (avoids colliding with any host user; CKV_K8S_40) that has no
# meaning inside the node/python base images beyond "not root" — nothing in either image chowns
# files to a named user, so any UID works as long as it isn't 0.
securityContext:
  runAsUser: 10001

# Per-service Postgres StatefulSet. content/identity = true; gateway = false.
postgres:
  enabled: false
  image: postgres:18-alpine
  user: qaroom
  password: qaroom # dev-only plaintext; NOT production (documented in ADR-0009)
  database: qaroom_content
  storage: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 256Mi
