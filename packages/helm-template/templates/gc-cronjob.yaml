{{- if .Values.gc.enabled }}
# Per-service TTL GC for the messaging substrate (aged PUBLISHED outbox rows + processed_events
# + idempotency_responses). HYGIENE ONLY — Commitment 17: correctness rests on the Nats-Msg-Id
# dedup window + processed_events, NOT on GC timing. ONE values-driven shape across services
# (no copy-pasted manifests); each release renders its OWN CronJob targeting its OWN Postgres
# (DB isolation) via the same databaseUrl helper the Deployment uses. The entrypoint
# (src/jobs/gc-dedup.ts) holds the determinism line — the TTL cutoff comes from the injected
# clock, never new Date(). Default OFF; enabled per service in deploy/<service>/values.yaml.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "qaroom-service.fullname" . }}-gc-dedup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qaroom-service.labels" . | nindent 4 }}
    qaroom.io/component: gc-dedup
  annotations:
    checkov.io/skip1: CKV_K8S_14=local kind-loaded image, no registry to tag beyond `latest`
    checkov.io/skip2: CKV_K8S_15=local kind-loaded image, IfNotPresent/Never by design (no registry to pull Always from)
    checkov.io/skip3: CKV_K8S_43=local kind-loaded image, no registry to resolve a digest against
    checkov.io/skip4: CKV_K8S_22=no writable-cache volume plumbed for moderator-agent's ML stack yet
    checkov.io/skip5: CKV_K8S_8=one-shot batch Job with restartPolicy Never; activeDeadlineSeconds is its liveness bound, not a probe
    checkov.io/skip6: CKV_K8S_9=one-shot batch Job with restartPolicy Never has no long-lived process for a readiness probe to poll
spec:
  schedule: {{ .Values.gc.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.gc.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.gc.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.gc.backoffLimit }}
      # With concurrencyPolicy: Forbid, a job that never terminates (e.g. one whose command was
      # clobbered into the long-lived dev server, as Tilt did before the gc.image fix) blocks EVERY
      # later schedule forever — the CronJob silently stops firing. A deadline kills a stuck job so
      # the next schedule runs; the real sweep finishes in seconds, far under this bound.
      activeDeadlineSeconds: {{ .Values.gc.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "qaroom-service.selectorLabels" . | nindent 12 }}
            qaroom.io/component: gc-dedup
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "qaroom-service.serviceAccountName" . }}
          automountServiceAccountToken: false
          securityContext:
            {{- include "qaroom-service.podSecurityContext" . | nindent 12 }}
          containers:
            - name: gc-dedup
              # Defaults to the service image. Override gc.image with a restart-free `-gc`
              # alias where Tilt's docker_build_with_restart would otherwise clobber `command`
              # (CI loads plain images, so the override there is honored as-is).
              image: "{{ .Values.gc.image | default .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                {{- include "qaroom-service.containerSecurityContext" . | nindent 16 }}
              command: ["pnpm", "--filter", {{ .Values.gc.package | quote }}, "exec", "tsx", "src/jobs/gc-dedup.ts"]
              env:
                - name: NODE_ENV
                  value: {{ .Values.nodeEnv | quote }}
                {{- $dburl := include "qaroom-service.databaseUrl" . }}
                {{- if $dburl }}
                - name: DATABASE_URL
                  value: {{ $dburl | quote }}
                {{- end }}
              resources:
                {{- toYaml .Values.gc.resources | nindent 16 }}
{{- end }}
