apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qaroom-service.fullname" . }}
  labels:
    {{- include "qaroom-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Zero-unavailability rolling update (T13). maxUnavailable:0 keeps the desired replica count up
  # for the whole rollout — the N+1 pod must be Ready before an N pod is torn down — so there is a
  # real N/N+1 coexistence window: v1 and v2 serve REST and consume NATS at the same time. The
  # runtime coexistence test (packages/contracts/src/events/mixed-version-coexistence.test.ts)
  # proves an N pod survives that window (parses the N+1 producer's events, quarantines a version it
  # cannot understand instead of crash-looping). maxSurge:1 bounds the extra pod to one at a time.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "qaroom-service.selectorLabels" . | nindent 6 }}
      qaroom.io/component: app
  template:
    metadata:
      labels:
        {{- include "qaroom-service.selectorLabels" . | nindent 8 }}
        qaroom.io/component: app
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        prometheus.io/port: {{ .Values.container.port | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "qaroom-service.serviceAccountName" . }}
      containers:
        - name: {{ include "qaroom-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
          env:
            - name: PORT
              value: {{ .Values.container.port | quote }}
            - name: NODE_ENV
              value: {{ .Values.nodeEnv | quote }}
            {{- $dburl := include "qaroom-service.databaseUrl" . }}
            {{- if $dburl }}
            - name: DATABASE_URL
              value: {{ $dburl | quote }}
            {{- end }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.otel.protocol | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | default (include "qaroom-service.name" .) | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.otel.resourceAttributes | quote }}
            - name: OTEL_SEMCONV_STABILITY_OPT_IN
              value: {{ .Values.otel.semconvOptIn | quote }}
            {{- end }}
            {{- range $k, $v := .Values.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.container.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.container.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
