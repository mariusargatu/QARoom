name: CI

# DISPATCH-FIRST + a PR light lane + one EVAL cron. The heavy tiers (chart/cluster/load/mutation/
# chaos) run on demand from the Actions tab (pick a `tier`) — a build-in-public repo on a fresh
# private remote gains nothing from an automatic CI storm on the expensive lanes. There are two
# automatic triggers, both deliberately cheap:
#   - `pull_request` runs ONLY the in-process light `verify` job (lint + typecheck + scripts tests +
#     test + every in-proc drift gate that needs no `uv`/cluster) — no cluster, no key. claims:verify
#     stays in the dispatch-only `claims` job because its moderator teeth need `uv` (pytest). This
#     keeps the repo's thesis ("tests catch regressions") continuously verified and lets `verify`
#     become a required status check. It runs on EVERY PR (no path filter): a path-filtered required
#     check never reports on an excluded PR and deadlocks the merge, so verify must always report.
#   - ONE weekly `schedule` cron fires the cost-bounded EVAL tier alone (real-OpenAI evals).
# Everything else stays workflow_dispatch.
#
# Dispatch tiers (workflow_dispatch input `tier`, default `light`) are CUMULATIVE — light < merge <
# nightly:
#   light   (every dispatch): verify, claims, contracts, fuzz, fuzz-identity, fuzz-webhooks,
#                             web-stories, moderator        — in-process, no cluster, fast lane
#   merge   (light +):        chart, cluster-smoke, tracetest, web-ct   — KinD cluster + chart + CT
#   nightly (merge +):        load, mutation, evomaster, chaos, coverage — heavy / search / chaos / floor gate
# Evals (moderator-evals: golden + DeepEval + DeepTeam) run on the `schedule` cron OR on a dispatch
# with `run_evals: true`; they are gated OUT of every tier so the cron fires evals only. PyRIT stays
# gauntlet-only (`pnpm gauntlet --pyrit`). The terminal `summary-envelope` job (needs: every folding
# job, if: always) fans the per-job evidence partials into ONE test-results/summary.json.
on:
  workflow_dispatch:
    inputs:
      tier:
        description: Which cumulative tier to run (light is a subset of merge is a subset of nightly).
        type: choice
        options:
          - light
          - merge
          - nightly
        default: light
      run_evals:
        description: Also run the real-OpenAI eval tier (otherwise schedule-cron only).
        type: boolean
        default: false
  schedule:
    # Weekly, Mondays 06:00 UTC. Fires the EVAL tier alone (moderator-evals + summary-envelope);
    # every build/cluster job is gated to workflow_dispatch, so the cron stays cost-bounded to the
    # keyed evals.
    - cron: '0 6 * * 1'
  # PR light lane (credibility crux): a pull request auto-runs ONLY the in-process `verify` job.
  # Heavy lanes stay dispatch-only via their `github.event_name == 'workflow_dispatch'` guards, and
  # summary-envelope is guarded off PRs, so a PR == verify only. NO `paths-ignore`: when `verify` is
  # a required check, filtering it out for some PRs (e.g. site-only) leaves the check permanently
  # "expected — waiting for status" and blocks merge. A site-only PR just runs the cheap verify lane;
  # the static-site DEPLOY still belongs to pages.yml.
  pull_request:

# Least privilege for the build/test lanes: read-only on the repo. (pages.yml and invariant-guard
# declare their own wider scopes where they genuinely need them.)
permissions:
  contents: read

jobs:
  # LIGHT tier (runs on every dispatch; never on the schedule cron).
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace

      - name: Lint (Biome + ESLint custom rules)
        run: pnpm lint

      - name: Typecheck
        # Exclude the Python moderator-agent: its pyright runs in the dedicated moderator dispatch
        # lane (with a uv env). This in-process verify lane has no uv, so its turbo `typecheck` task
        # would always fail here. JS/TS only.
        run: pnpm exec turbo run typecheck --filter=!@qaroom/moderator-agent

      # Orchestration-tier tests (scripts/**/*.test.ts) — the honesty layer's own false-green guards
      # (census fail-on-recorded-failure, fold-merge, tenant-span audit). `scripts/` is not a
      # workspace package, so test-results:generate never sees it; run it here so these tests gate PRs.
      - name: Test the orchestration scripts (false-green guards)
        run: pnpm test:scripts

      - name: Test + aggregate results
        run: pnpm test-results:generate

      # The flags mbt suite writes its edge-coverage artifacts during the test run above;
      # this folds them into summary.json as the mbt-edge-coverage runner (all-transitions
      # 7/7 + illegal-pairs 23/23) and fails if either coverage is incomplete.
      - name: Fold MBT edge-coverage results into summary.json
        run: pnpm mbt:results

      # Backend v8 coverage (content + donations) folded as coverage:<svc> runners. Runs HERE (not
      # only in web-ct/summary-envelope) so it rides partial-verify into the final envelope; must come
      # after test-results:generate, which rewrites the envelope from scratch. SKIPPED on the PR lane:
      # it re-runs the 5 backend suites already run un-instrumented above (~2x backend test time), the
      # coverage floor isn't enforced on PRs (the `coverage` job is dispatch-only), and the partial
      # isn't folded on PRs (summary-envelope is guarded off PRs) — so on a PR it is pure wasted work.
      - name: Backend coverage (all 5 services) + fold into summary.json
        if: github.event_name != 'pull_request'
        run: |
          pnpm --filter @qaroom/content --filter @qaroom/donations --filter @qaroom/flags --filter @qaroom/gateway --filter @qaroom/identity run test:coverage
          pnpm coverage:results

      - name: Verify test-results/summary.json against frozen schema
        run: pnpm test-results:verify

      - name: Render test report to the run summary
        if: always()
        run: pnpm test-results:report

      - name: Verify OpenAPI (Zod drift + oasdiff breaking-change gate)
        run: pnpm openapi:verify

      - name: Verify AsyncAPI (Zod drift + classifier breaking-change gate)
        run: pnpm asyncapi:verify

      - name: Verify MCP tool manifest (drift + breaking-change classifier)
        run: pnpm mcp:verify

      - name: Verify code-tour anchors (every cited file:line still says what the tour says)
        run: pnpm tour:verify

      - name: Verify chaos experiments (every manifest has exactly one README table row)
        run: pnpm chaos:verify

      - name: Registry census (boundary registry / gate roster has no orphans or drift)
        run: pnpm census

      # Detection-matrix drift gate (in-proc, no uv/cluster): the rendered docs/detection-matrix.md
      # must agree with its manifest. An AGENTS-designated invariant source, so it must gate every PR.
      - name: Verify detection matrix (census only)
        # Census (manifest ↔ env read sites) is in-process. The rendered-matrix/SVG drift half of
        # matrix:verify needs test-results/detection-matrix.json from a live `pnpm matrix` run, which
        # this light lane doesn't do — that drift gate runs in the matrix dispatch lane.
        run: pnpm tsx scripts/detection-matrix.ts --verify

      # The in-proc base envelope (vitest aggregate + mbt-edge-coverage, commit-stamped). The
      # terminal summary-envelope job reuses this as the base it folds the cluster/eval partials onto.
      - name: Upload the in-proc base summary partial
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-verify
          path: test-results/summary.json
          if-no-files-found: warn

  # Falsifiable-claims gate: prove the claim manifest cannot decay into theater. Needs BOTH pnpm
  # (webhook-claim teeth = vitest) AND uv (moderator-claim teeth = pytest). Without uv a moderator
  # `prove --break` now exits 2 ("GATE DID NOT RUN") and claims:verify fails LOUDLY (no longer a
  # false RED) — but this job provisions uv so the teeth actually run. So it regenerates the in-proc
  # summary here (the runners the claims' evidence points at), then runs
  # claims:verify (evidence + wired + teeth + README block drift) and the matrix census. Live-tier
  # claims (tenant-spans, k6) skip their teeth — no cluster in this job — and resolve STALE-not-fatal.
  claims:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      moderator-pg:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: qaroom
          POSTGRES_PASSWORD: qaroom
          POSTGRES_DB: qaroom_moderator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qaroom" --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"
      - name: Aggregate the in-proc summary (the runners the claims' evidence resolves against)
        run: pnpm test-results:generate && pnpm mbt:results
      - name: Fold the moderator runner (moderator-abstain + input-guard evidence)
        env:
          QAROOM_TEST_DATABASE_URL: postgresql://qaroom:qaroom@localhost:5432/qaroom_moderator
        run: |
          (cd services/moderator-agent && uv run pytest -q)
          pnpm moderator:results
      - name: claims:verify (evidence + wired + teeth + README drift)
        run: pnpm claims:verify
      - name: Detection-matrix census + rendered-doc drift gate
        run: pnpm matrix:verify

  # Consumer-driven contract verification: each provider verifies every pact under
  # services/*/pacts that names it, against a real Postgres (Testcontainers).
  contracts:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Pact provider verification (content)
        run: pnpm pact:verify --provider content
      - name: Pact provider verification (identity)
        run: pnpm pact:verify --provider identity
      - name: Pact provider verification (donations)
        run: pnpm pact:verify --provider donations
      - name: Pact provider verification (flags)
        run: pnpm pact:verify --provider flags
      - name: Pact provider verification (webhooks)
        run: pnpm pact:verify --provider webhooks

  # Trust-boundary fuzzing: bring up content + gateway, then fuzz the gateway's OpenAPI
  # with Schemathesis (containerized — no Python in the monorepo).
  fuzz:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Start Postgres
        run: docker compose -f services/content/docker-compose.yaml up -d
      - name: Start content + gateway
        run: |
          DATABASE_URL=postgres://qaroom:qaroom@localhost:5432/qaroom_content PORT=8081 \
            pnpm --filter @qaroom/content exec tsx src/server.ts &
          for i in $(seq 1 30); do curl -fs http://localhost:8081/system/state && break || sleep 1; done
          CONTENT_BASE_URL=http://localhost:8081 PORT=8090 \
            pnpm --filter @qaroom/gateway exec tsx src/server.ts &
          for i in $(seq 1 30); do curl -fs http://localhost:8090/system/state && break || sleep 1; done
      - name: Schemathesis gate (gateway)
        run: bash scripts/schemathesis-gate.sh services/gateway http://host.docker.internal:8090

  # Trust-boundary fuzzing for identity: its OAS is reachable and carries branded params +
  # strict bodies, so Schemathesis proves no generated input yields a 5xx or a spec violation.
  fuzz-identity:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Start identity Postgres
        run: docker compose -f services/identity/docker-compose.yaml up -d --wait
      - name: Start identity-service
        run: |
          DATABASE_URL=postgres://qaroom:qaroom@localhost:5433/qaroom_identity PORT=8082 \
            pnpm --filter @qaroom/identity exec tsx src/server.ts &
          for i in $(seq 1 30); do curl -fs http://localhost:8082/system/state && break || sleep 1; done
      - name: Schemathesis gate (identity)
        run: bash scripts/schemathesis-gate.sh services/identity http://host.docker.internal:8082

  # Trust-boundary fuzzing for webhooks (Milestone 11): the subscription CRUD is a real input
  # boundary (SSRF-guarded URLs, branded params, strict bodies, OAS links for the stateful phase).
  # webhooks-service boots HTTP-only (NATS fail-soft), so only Postgres is needed.
  fuzz-webhooks:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Start webhooks Postgres
        run: docker compose -f services/webhooks/docker-compose.yaml up -d --wait
      - name: Start webhooks-service
        run: |
          DATABASE_URL=postgres://qaroom:qaroom@localhost:5436/qaroom_webhooks PORT=8087 \
            pnpm --filter @qaroom/webhooks exec tsx src/server.ts &
          for i in $(seq 1 30); do curl -fs http://localhost:8087/system/state && break || sleep 1; done
      - name: Schemathesis gate (webhooks)
        run: bash scripts/schemathesis-gate.sh services/webhooks http://host.docker.internal:8087

  # Storybook portable stories headless (Milestone 8, ADR-0005): every story's play() + addon-a11y
  # run in real Chromium via the @storybook/addon-vitest Vitest runner. Light tier — fast enough, and
  # it catches the broken-atom regression early (a11y is set to fail, parameters.a11y.test: 'error').
  web-stories:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Install Chromium
        run: pnpm --filter @qaroom/web exec playwright install --with-deps chromium
      - name: Storybook stories (play + a11y, headless)
        run: pnpm --filter @qaroom/web run test:stories

  # Python moderator-agent (Milestone 9): ruff + pyright + pytest. A pgvector Postgres service
  # exercises the Postgres/pgvector stores (the integration tests skip without it); the in-memory
  # fakes cover the workflow/API deterministically. Folds a `moderator` runner into summary.json.
  moderator:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      moderator-pg:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: qaroom
          POSTGRES_PASSWORD: qaroom
          POSTGRES_DB: qaroom_moderator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qaroom" --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"
      - name: Lint (ruff)
        working-directory: services/moderator-agent
        run: uv run ruff check . && uv run ruff format --check .
      - name: Typecheck (pyright)
        working-directory: services/moderator-agent
        run: uv run pyright
      - name: Test (pytest — in-memory fakes + pgvector integration)
        working-directory: services/moderator-agent
        env:
          QAROOM_TEST_DATABASE_URL: postgresql://qaroom:qaroom@localhost:5432/qaroom_moderator
        # --cov-fail-under is the Python half of the coverage floor gate (the TS half is the nightly
        # `coverage` job). Runs here, with the DB up, so integration paths count toward the floor.
        run: uv run pytest -q --cov --cov-fail-under=74
      - name: Fold moderator runner into summary.json
        if: always()
        run: pnpm moderator:results || true
      - name: Upload moderator pytest report partial
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-moderator
          path: services/moderator-agent/test-results/pytest-summary.json
          if-no-files-found: warn

  # MERGE tier (light + the chart/cluster/CT lanes).
  #
  # Cheap manifest gate: the shared Helm chart + observability manifests lint and validate
  # against the Kubernetes schemas (kubeconform) — catches malformed manifests in seconds.
  chart:
    if: github.event_name == 'workflow_dispatch' && (inputs.tier == 'merge' || inputs.tier == 'nightly')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v4.1.1
      - name: Install kubeconform
        # Pinned (was `releases/latest`): an unpinned `curl | sudo tar` from a moving release is a
        # supply-chain foot-gun and makes the chart lane non-reproducible. Bump deliberately.
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform
      - name: Lint + validate chart releases
        run: |
          for svc in content identity gateway moderator-agent webhooks; do
            helm lint packages/helm-template -f deploy/$svc/values.yaml
            helm template $svc packages/helm-template -f deploy/$svc/values.yaml \
              | kubeconform -strict -summary -ignore-missing-schemas
          done
      - name: Validate observability manifests
        run: kubeconform -strict -summary -ignore-missing-schemas deploy/observability/*.yaml

  # Bring the whole stack up on KinD (shared cluster-up composite action), smoke every service's
  # liveness probe through its Service, and prove the deliberate-broken value fails the smoke.
  cluster-smoke:
    if: github.event_name == 'workflow_dispatch' && (inputs.tier == 'merge' || inputs.tier == 'nightly')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: ./.github/actions/cluster-up
        with:
          services: content identity gateway
          wait-observability: "false"
          pod-wait-timeout: "180s"
      - name: Smoke (each service's liveness probe via its Service)
        run: bash scripts/smoke.sh
      - name: Negative test — a broken service.targetPort must fail the smoke
        run: |
          helm upgrade content packages/helm-template -n qaroom \
            -f deploy/content/values.yaml -f deploy/content/values.broken.yaml --set image.pullPolicy=Never
          if bash scripts/smoke.sh; then
            echo "ERROR: smoke passed with a broken targetPort"; exit 1
          fi
          echo "✓ broken value correctly failed the smoke"
          helm upgrade content packages/helm-template -n qaroom \
            -f deploy/content/values.yaml --set image.pullPolicy=Never

  # Trace-based testing (merge lane — Tracetest infra exceeds the fast PR budget; roadmap §M4).
  # Brings the stack up on KinD with NATS + Tracetest (cluster-up composite, wait-observability on),
  # then asserts the publish-side post.created trace spans sync HTTP and async messaging coherently.
  tracetest:
    if: github.event_name == 'workflow_dispatch' && (inputs.tier == 'merge' || inputs.tier == 'nightly')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: ./.github/actions/cluster-up
        with:
          services: content identity flags donations gateway
          pod-wait-timeout: "240s"
      - name: Install the Tracetest CLI
        run: curl -L https://raw.githubusercontent.com/kubeshop/tracetest/main/install-cli.sh | sudo bash
      - name: Assert the full Tracetest suite (all 5 trace-based tests)
        run: |
          kubectl port-forward -n observability svc/qaroom-tracetest 11633:11633 &
          for i in $(seq 1 30); do curl -fs http://localhost:11633 >/dev/null && break || sleep 2; done
          tracetest configure --server-url http://localhost:11633
          # Unique per-run id so the rollout/donation tests don't hit idempotent replay (their
          # Idempotency-Key is `tt-${var:runId}`; a repeat would suppress the transition).
          RUN_ID=$(date +%s)
          tracetest run test -f services/content/tests/tracetest/post-created-publish.yaml --wait-for-result
          tracetest run test -f services/content/tests/tracetest/feed-read.yaml --wait-for-result
          tracetest run test -f services/content/tests/tracetest/create-missing-idempotency-key.yaml --wait-for-result
          tracetest run test -f services/flags/tests/tracetest/rollout-transition.yaml --vars runId="$RUN_ID" --wait-for-result
          tracetest run test -f services/donations/tests/tracetest/donation-create-publish.yaml --vars runId="$RUN_ID" --wait-for-result

  # Playwright Component Tests + unified coverage (Milestone 8). Heavier (real Chromium per mount +
  # the V8/Istanbul coverage merge), so merge-gated. Folds a `web-ct` runner (scripts/ct-results.ts)
  # and a `coverage` runner (scripts/coverage-results.ts) into summary.json.
  web-ct:
    if: github.event_name == 'workflow_dispatch' && (inputs.tier == 'merge' || inputs.tier == 'nightly')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Install Chromium
        run: pnpm --filter @qaroom/web exec playwright install --with-deps chromium
      - name: Component tests with coverage (Istanbul)
        run: pnpm --filter @qaroom/web run ct:coverage
      - name: Story coverage (V8)
        run: pnpm --filter @qaroom/web run test:stories:coverage
      - name: Merge V8 + Istanbul coverage (monocart)
        run: pnpm --filter @qaroom/web run coverage:merge
      - name: Fold web-ct runner into summary.json
        if: always()
        run: pnpm --filter @qaroom/web run ct:results
      - name: Upload the web-ct Playwright report partial
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-web-ct
          path: services/web/test-results/ct.json
          if-no-files-found: warn
      - name: Upload the merged web coverage partial (also human-inspectable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-web-coverage
          path: services/web/coverage/merged
          if-no-files-found: warn

  # NIGHTLY tier (merge + the heavy / search / chaos lanes).
  #
  # Load testing vs SLOs (Milestone 8, docs/03 §8 — exceeds the PR-fast budget). Brings up
  # content-service (mirroring `fuzz`), runs the k6 write-heavy + read-heavy scripts against the
  # documented SLOs, then PROVES the gate is sensitive: a deliberate slow path
  # (CONTENT_BUG_VOTE_SLOW_MS) must breach the vote SLO and make k6 exit 99. K6_SLO_MULTIPLIER widens
  # the clean-run thresholds to absorb shared-runner variance; the negative test is the hard proof.
  load:
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'nightly'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Start Postgres + NATS (compose waits for both healthchecks)
        run: docker compose -f services/content/docker-compose.yaml up -d --wait
      - name: Generate k6 thresholds from SLO_TARGETS (and fail on drift vs committed)
        run: |
          pnpm k6:gen
          git diff --exit-code load-tests/lib/slo-thresholds.gen.json
      - name: Start content-service
        run: |
          DATABASE_URL=postgres://qaroom:qaroom@localhost:5432/qaroom_content \
            NATS_URL=nats://localhost:4222 PORT=8081 \
            pnpm --filter @qaroom/content exec tsx src/server.ts &
          for i in $(seq 1 30); do curl -fs http://localhost:8081/system/state && break || sleep 1; done
      - name: k6 — vote casting + feed (clean run must pass)
        run: |
          mkdir -p test-results
          for script in vote-cast feed; do
            docker run --rm --network host --user "$(id -u):$(id -g)" -v "$PWD":/work -w /work \
              grafana/k6 run "load-tests/$script.js" \
              -e CONTENT_BASE_URL=http://localhost:8081 -e K6_SLO_MULTIPLIER=3
          done
      - name: Fold the clean k6 results into summary.json
        run: pnpm k6:results
      - name: Negative test — a deliberate slow path must breach the vote SLO (k6 exit 99)
        run: |
          # Stop the clean server by its real process (pnpm's $! is only the wrapper) and wait for
          # the port to free before relaunching with the slow-path toggle, so k6 measures the SLOW
          # server — not the clean one still holding :8081.
          pkill -f 'tsx src/server.ts' || true
          for i in $(seq 1 15); do curl -fs http://localhost:8081/system/state >/dev/null 2>&1 || break; sleep 1; done
          DATABASE_URL=postgres://qaroom:qaroom@localhost:5432/qaroom_content \
            NATS_URL=nats://localhost:4222 PORT=8081 CONTENT_BUG_VOTE_SLOW_MS=800 \
            pnpm --filter @qaroom/content exec tsx src/server.ts &
          for i in $(seq 1 30); do curl -fs http://localhost:8081/system/state && break || sleep 1; done
          set +e
          docker run --rm --network host --user "$(id -u):$(id -g)" -v "$PWD":/work -w /work \
            grafana/k6 run load-tests/vote-cast.js \
            -e CONTENT_BASE_URL=http://localhost:8081 -e K6_SLO_MULTIPLIER=3
          code=$?
          set -e
          if [ "$code" -ne 99 ]; then
            echo "ERROR: expected k6 exit 99 (SLO threshold breach), got $code"; exit 1
          fi
          echo "✓ slow path correctly breached the vote SLO (k6 exit 99)"
      - name: Upload k6 result partials
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-load
          path: test-results/k6-*.json
          if-no-files-found: warn

  # Mutation testing on the locked critical-modules list (ADR-0016). Nightly — Stryker
  # re-runs each module's suite per mutant, far exceeding the PR-fast budget. The fast tier (pure
  # logic + in-process pglite) needs no cluster; each package enforces its own thresholds.break.
  mutation:
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'nightly'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Stryker on the critical modules
        run: pnpm stryker:critical
      - name: Merge mutation results into summary.json
        if: always()
        run: pnpm stryker:results || true
      - name: Upload Stryker result partials
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-mutation
          path: test-results/stryker-*.json
          if-no-files-found: warn

  # Search-based fuzzing (EvoMaster v6 black-box, ADR-0016). Nightly — the search budget far exceeds
  # the PR-fast window. Brings up content (mirroring `fuzz`), runs EvoMaster from the committed OAS,
  # and gates DETERMINISTICALLY on "ran + emitted ≥1 test file" (never the stochastic fault count).
  # Findings are hand-reified into the regression catalog (scenario 5); raw output is a disposable
  # artifact. The jar is cached by version; the M0 spike validated EvoMaster against TS Fastify.
  evomaster:
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'nightly'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache the EvoMaster v6.0.0 jar
        uses: actions/cache@v4
        with:
          path: .evomaster/evomaster.jar
          key: evomaster-jar-v6.0.0
      - name: Start Postgres + NATS (compose waits for both healthchecks)
        run: docker compose -f services/content/docker-compose.yaml up -d --wait
      - name: Start content-service
        run: |
          DATABASE_URL=postgres://qaroom:qaroom@localhost:5432/qaroom_content \
            NATS_URL=nats://localhost:4222 PORT=8081 \
            pnpm --filter @qaroom/content exec tsx src/server.ts &
          for i in $(seq 1 30); do curl -fs http://localhost:8081/system/state && break || sleep 1; done
      - name: EvoMaster black-box search
        run: pnpm evomaster
      - name: Gate — ran and emitted ≥1 test file; merge into summary.json
        if: always()
        run: pnpm evomaster:results
      - name: Upload EvoMaster generated suite partial
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-evomaster
          path: services/content/tests/evomaster-generated
          if-no-files-found: warn

  # Nightly chaos tier (ADR-0014): bring the full stack up on KinD (cluster-up composite), install
  # Chaos Mesh, and run the TypeScript steady-state harness (tests/chaos). KinD's containerd socket
  # differs from k3d's, so the chaos-daemon socket is overridden via CHAOS_CONTAINERD_SOCKET.
  chaos:
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'nightly'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: ./.github/actions/cluster-up
        with:
          services: content identity flags donations gateway
      - name: Install Chaos Mesh (KinD containerd socket)
        run: CHAOS_CONTAINERD_SOCKET=/run/containerd/containerd.sock pnpm chaos:install
      - name: Chaos smoke — prove injection works
        run: pnpm chaos:smoke
      - name: Run chaos experiments (steady-state harness)
        run: pnpm chaos:run
      - name: Merge chaos runner into summary.json
        if: always()
        run: pnpm chaos:results
      - name: Upload chaos report partial
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-chaos
          path: test-results/chaos.json
          if-no-files-found: warn

  # Coverage floor gate (nightly — instrumentation is too heavy for the fast lanes). Runs LINE
  # coverage for every TS package against a committed floor and fails on a drop, so coverage cannot
  # drift down unnoticed. The moderator (Python) half is gated in its own `moderator` job via
  # `pytest --cov-fail-under`; `uv` is absent here, so that target is skipped gracefully. `services/web`
  # is a deferred separate effort and is intentionally not yet floored.
  coverage:
    # Merge bar (was nightly-only): the coverage floor runs at the `merge` tier, not just `nightly`,
    # so the pre-merge dispatch a PR is gated by exercises it — else a coverage regression rides a
    # merge-tier review through green. It stays DISPATCH-only (not on the automatic PR light lane):
    # full v8 instrumentation is too heavy for every push, so the floor is enforced when you dispatch
    # the merge tier before merge, not on each PR commit.
    if: github.event_name == 'workflow_dispatch' && (inputs.tier == 'merge' || inputs.tier == 'nightly')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Coverage floor gate
        run: pnpm coverage

  # EVAL tier (the schedule cron's sole payload, or any dispatch with run_evals: true). NEVER gated to
  # a `tier` — it must be excluded from the build/cluster lanes so the cron fires evals only (ADR-0017,
  # ADR-0020; mirrors the gauntlet's phase-2 LLM lane). The pre-flight cost guard runs always (keyless);
  # the golden-set + metamorphic pytest lane, the DeepEval quality suite, and the DeepTeam red-team hit
  # real OpenAI and run only when the OPENAI_API_KEY secret is present, so a missing secret degrades to a
  # recorded skip — never a hard fail. PyRIT (longest, most spend) stays gauntlet-only
  # (`pnpm gauntlet --pyrit`). Promptfoo was dropped in Milestone 12 (ADR-0020).
  moderator-evals:
    if: github.event_name == 'schedule' || inputs.run_evals
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"
      - name: Pre-flight cost guard (estimate vs MODERATOR_EVAL_BUDGET_TOKENS)
        working-directory: services/moderator-agent
        run: uv run python -m moderator_agent.eval_cost_guard
      - name: Golden-set + metamorphic paraphrase-invariance (real OpenAI)
        if: env.OPENAI_API_KEY != ''
        working-directory: services/moderator-agent
        run: uv run pytest -q -m llm
      - name: Fold the golden runner into summary.json
        if: env.OPENAI_API_KEY != ''
        run: pnpm golden:results
      - name: DeepEval quality suite (RAG + agentic + G-Eval, real OpenAI)
        if: env.OPENAI_API_KEY != ''
        run: pnpm --filter @qaroom/moderator-agent run eval:deepeval
      - name: Fold the deepeval runner into summary.json
        if: env.OPENAI_API_KEY != ''
        run: pnpm deepeval:results
      - name: DeepTeam red-team (OWASP LLM Top 10 subset, real OpenAI)
        if: env.OPENAI_API_KEY != ''
        run: pnpm --filter @qaroom/moderator-agent run eval:deepteam
      - name: Fold the deepteam runner into summary.json
        if: env.OPENAI_API_KEY != ''
        run: pnpm deepteam:results
      - name: Note when the evals are skipped
        if: env.OPENAI_API_KEY == ''
        run: 'echo "OPENAI_API_KEY not set: eval suites skipped (cost guard still ran)."'
      - name: Upload golden-set partial
        if: always() && env.OPENAI_API_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: partial-golden
          path: services/moderator-agent/evals/golden/gold.json
          if-no-files-found: warn
      - name: Upload DeepEval partial
        if: always() && env.OPENAI_API_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: partial-deepeval
          path: services/moderator-agent/test-results/deepeval-output.json
          if-no-files-found: warn
      - name: Upload DeepTeam partial
        if: always() && env.OPENAI_API_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: partial-deepteam
          path: services/moderator-agent/test-results/deepteam-output.json
          if-no-files-found: warn

  # Evidence fan-in (T3): the single place a complete test-results/summary.json is assembled. Every
  # runner-folding job above uploads its RAW result report as a `partial-*` artifact; this job
  # downloads whatever ran and re-folds each through its existing *-results fold script (foldRunner's
  # replace-by-name merge path) into ONE envelope. `if: always()` + per-partial guards mean a lane
  # that did not run (key/cluster absent) is a SKIP, never a failure. The census runs at the `in-proc`
  # tier: CI never assembles the full ingress-E2E + journey + keyed-eval + PyRIT set that `--tier full`
  # requires (that is the local `pnpm gauntlet`), so cluster/keyed runners are reported DEFERRED, not
  # fatal — exactly matching "a missing partial is a skip, not a failure".
  summary-envelope:
    needs:
      - verify
      - moderator
      - web-ct
      - load
      - mutation
      - evomaster
      - chaos
      - moderator-evals
    # `always()` so a skipped/failed dependency still assembles the envelope — but NOT on the PR
    # light lane, where only `verify` runs and a full envelope is neither expected nor useful.
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Download every evidence partial that was produced
        # No `name:` -> downloads all partials from this run into partials/<artifact-name>/. Tolerant
        # of the empty set (e.g. a keyless schedule cron) via continue-on-error.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: partials
      - name: Assemble one envelope — base, then fold each present partial
        run: |
          set -eu
          mkdir -p test-results services/web/test-results services/web/coverage/merged \
            services/moderator-agent/test-results services/moderator-agent/evals/golden \
            services/content/tests/evomaster-generated

          # Base envelope (vitest aggregate + mbt-edge-coverage + commit stamp). Reuse the verify
          # job's base when present (any dispatch); on the schedule cron verify does not run, so
          # regenerate it so the census still has its one hard requirement (the vitest aggregate) and
          # a real commit stamp. foldRunner preserves the base commit/generated_at across folds.
          if [ -f partials/partial-verify/summary.json ]; then
            cp partials/partial-verify/summary.json test-results/summary.json
            echo "base: reused the verify partial"
          else
            echo "base: no verify partial (schedule cron) — regenerating in-proc base"
            pnpm test-results:generate && pnpm mbt:results
          fi

          # Fold each partial that a job actually uploaded. Gating on the PARTIAL (not the canonical
          # path) keeps a committed-but-not-run fixture (e.g. the committed gold.json) from folding
          # spuriously. `|| true` keeps a runner's own red (already failing its source job) from
          # failing the assembly — the schema/census step below is this job's gate.
          if [ -f partials/partial-moderator/pytest-summary.json ]; then
            cp partials/partial-moderator/pytest-summary.json services/moderator-agent/test-results/
            pnpm moderator:results || true
          fi
          if [ -f partials/partial-web-ct/ct.json ]; then
            cp partials/partial-web-ct/ct.json services/web/test-results/
            pnpm --filter @qaroom/web run ct:results || true
          fi
          if [ -f partials/partial-web-coverage/coverage-summary.json ]; then
            cp partials/partial-web-coverage/coverage-summary.json services/web/coverage/merged/
            pnpm coverage:results || true
          fi
          if ls partials/partial-load/k6-*.json >/dev/null 2>&1; then
            cp partials/partial-load/k6-*.json test-results/
            pnpm k6:results || true
          fi
          if ls partials/partial-mutation/stryker-*.json >/dev/null 2>&1; then
            cp partials/partial-mutation/stryker-*.json test-results/
            pnpm stryker:results || true
          fi
          if ls partials/partial-evomaster/*_Test.js >/dev/null 2>&1; then
            cp -R partials/partial-evomaster/. services/content/tests/evomaster-generated/
            pnpm evomaster:results || true
          fi
          if [ -f partials/partial-chaos/chaos.json ]; then
            cp partials/partial-chaos/chaos.json test-results/
            pnpm chaos:results || true
          fi
          if [ -f partials/partial-golden/gold.json ]; then
            cp partials/partial-golden/gold.json services/moderator-agent/evals/golden/
            pnpm golden:results || true
          fi
          if [ -f partials/partial-deepeval/deepeval-output.json ]; then
            cp partials/partial-deepeval/deepeval-output.json services/moderator-agent/test-results/
            pnpm deepeval:results || true
          fi
          if [ -f partials/partial-deepteam/deepteam-output.json ]; then
            cp partials/partial-deepteam/deepteam-output.json services/moderator-agent/test-results/
            pnpm deepteam:results || true
          fi
      - name: Verify the complete envelope (frozen schema + census)
        # in-proc tier: CI cannot satisfy --tier full (no ingress E2E / journey / tenant-spans /
        # PyRIT here), so absent cluster/keyed runners resolve DEFERRED, never fatal.
        env:
          QAROOM_VERIFY_TIER: in-proc
        run: pnpm test-results:verify
      - name: Render the complete envelope to the run summary
        if: always()
        run: pnpm test-results:report
      - name: Upload the single complete test-results envelope
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-summary
          path: test-results/summary.json
          if-no-files-found: warn
