name: CI

# THE PR FAST LANE — and the ONLY automatic build/test workflow a pull request fires. It contains a
# SINGLE job (`verify`), so a PR shows exactly one CI check with NO grey "Skipped" noise. This is the
# structural fix for the old monolith: 20 jobs lived in one pull_request-triggered file, 19 of them
# `if:`-gated off on a PR, so every PR rendered 19 grey "Skipped" lines. The cure is trigger-scoping
# (ADR-0040): a workflow that is NOT triggered for an event produces ZERO checks for it (unlike a
# false-`if:` JOB, which still renders "Skipped"). So every heavy/cluster/eval lane moved OUT of this
# file into trigger-scoped workflows that a PR never fires:
#   - nightly.yml   schedule  — integration tier nightly, heavy tier weekly (activity-gated)
#   - release.yml   dispatch  — the manual build -> integration -> deploy-gate promotion pipeline
#   - evals.yml     schedule  — the cost-bounded real-OpenAI eval tier (weekly)
#   - _integration.yml / _heavy.yml / _envelope.yml — reusable lane libraries the above call
# The dispatch-first COST intent (no CI storm on a build-in-public repo) is preserved: heavy lanes
# still never auto-run on a PR; they run on a schedule or on demand. See ADR-0040.
#
# `verify` is a REQUIRED status check (branch protection). It MUST stay an inline top-level job named
# exactly `verify` — a reusable `workflow_call` job would rename the check context to `ci / verify`
# and silently break branch protection. It runs on EVERY PR with no `paths-ignore`: a path-filtered
# required check never reports on an excluded PR and deadlocks the merge.
on:
  pull_request:
  workflow_dispatch:

# Cancel a superseded run when a contributor pushes again to the same PR/ref — reclaims CI minutes
# and shortens time-to-green on the latest commit.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least privilege: read-only on the repo.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # Lint the workflow YAML itself (expressions, needs/if/matrix graph, runner labels, and — via
      # the runner's preinstalled shellcheck — the `run:` shell blocks). Cheap, and now load-bearing:
      # with the pipeline split across more files, a malformed `if:`/`needs:` that would deadlock a
      # required check is caught here on the PR instead of minutes into a dispatched lane. Pinned —
      # bump deliberately (mirrors the kubeconform/osv-scanner install convention).
      - name: Lint workflows (actionlint)
        # SHELLCHECK_OPTS=--severity=warning: fail on shell BUGS (unset vars, bad quoting that splits,
        # unused assignments) but not style/info noise — some `run:` blocks word-split on purpose
        # (e.g. invariant-guard's `$PATHS`), which is correct, not a defect.
        env:
          SHELLCHECK_OPTS: --severity=warning
        run: |
          curl -sSL https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin actionlint
          actionlint -color

      - uses: ./.github/actions/setup-workspace

      - name: Lint (Biome + ESLint custom rules)
        run: pnpm lint

      - name: Typecheck
        # Exclude the Python moderator-agent: its pyright runs in the _integration `moderator` lane
        # (with a uv env). This in-process verify lane has no uv. JS/TS only.
        run: pnpm exec turbo run typecheck --filter=!@qaroom/moderator-agent

      # Orchestration-tier tests (scripts/**/*.test.ts) — the honesty layer's own false-green guards
      # (census fail-on-recorded-failure, fold-merge, tenant-span audit). `scripts/` is not a
      # workspace package, so test-results:generate never sees it; run it here so these tests gate PRs.
      - name: Test the orchestration scripts (false-green guards)
        run: pnpm test:scripts

      - name: Test + aggregate results
        run: pnpm test-results:generate

      # The flags mbt suite writes its edge-coverage artifacts during the test run above; this folds
      # them into summary.json (all-transitions 7/7 + illegal-pairs 23/23) and fails if incomplete.
      - name: Fold MBT edge-coverage results into summary.json
        run: pnpm mbt:results

      # Backend v8 coverage folded as coverage:<svc> runners. SKIPPED on the PR lane (re-runs the 5
      # backend suites already run un-instrumented above; the coverage floor is enforced in the
      # _integration `coverage` lane, and no envelope is folded on a PR). Runs on a manual dispatch.
      - name: Backend coverage (all 5 services) + fold into summary.json
        if: github.event_name != 'pull_request'
        run: |
          pnpm --filter @qaroom/content --filter @qaroom/donations --filter @qaroom/flags --filter @qaroom/gateway --filter @qaroom/identity run test:coverage
          pnpm coverage:results

      - name: Verify test-results/summary.json against frozen schema
        run: pnpm test-results:verify

      - name: Render test report to the run summary
        if: always()
        run: pnpm test-results:report

      - name: Verify OpenAPI (Zod drift + oasdiff breaking-change gate)
        run: pnpm openapi:verify

      - name: Verify AsyncAPI (Zod drift + classifier breaking-change gate)
        run: pnpm asyncapi:verify

      - name: Verify MCP tool manifest (drift + breaking-change classifier)
        run: pnpm mcp:verify

      # Derivation-chain conformance (T23, ADR-0033): recompute the ±1 set from the codeowned source
      # and diff it against the live property generator.
      - name: Verify derivation-chain conformance (deriver vs. its single source)
        run: pnpm deriver:verify

      # Adversarial prove (T23, ADR-0033): the named attack taxonomy vs. the gates — each cheat must be
      # real theater AND caught by its designated gate.
      - name: Adversarial prove (named attack taxonomy vs. the gates)
        run: pnpm prove:adversarial

      - name: Verify code-tour anchors (every cited file:line still says what the tour says)
        run: pnpm tour:verify

      - name: Verify doc links (every relative markdown link resolves on disk)
        run: pnpm links:check

      - name: Verify chaos experiments (every manifest has exactly one README table row)
        run: pnpm chaos:verify

      - name: Registry census (boundary registry / gate roster has no orphans or drift)
        run: pnpm census

      # ADR index drift gate (in-proc, no uv/cluster): the generated docs/adr/README.md must match the
      # ADR files on disk. Previously this ran ONLY in local `pnpm verify`, so the index could drift on
      # main with every CI check green — scripts/ci-verify-parity.test.ts pins that CI runs it.
      - name: Verify ADR index (generated docs/adr/README.md matches the ADR files)
        run: pnpm adr:index --check

      - name: Web component census (every atomic-design component has a CSF-factory story, ADR-0027)
        run: pnpm --filter @qaroom/web run census

      # Detection-matrix drift gate (census half — in-proc, no live matrix run): the manifest <-> env
      # read sites. The rendered-matrix/SVG drift half runs in the _integration matrix lane.
      - name: Verify detection matrix (census only)
        run: pnpm tsx scripts/detection-matrix.ts --check

      # Stress-experiment drift gate (T26, ADR-0039): docs/stress-experiment.md must agree with a fresh
      # render of the 5 instrumented metrics (derived-only).
      - name: Verify stress-experiment report (5 metrics, derived-doc drift)
        run: pnpm stress:verify

      # The in-proc base envelope (vitest aggregate + mbt-edge-coverage, commit-stamped). reviewer-agents
      # downloads this `partial-verify` from THIS ci.yml run to refute false-impact findings; the
      # scheduled/release _envelope job reuses it as the base when present.
      - name: Upload the in-proc base summary partial
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: partial-verify
          path: test-results/summary.json
          if-no-files-found: warn
