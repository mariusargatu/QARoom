# Static GitHub Pages deploy. Serves the hand-authored overview at /QARoom/ and the generated
# Structurizr model site (C4 + testing diagrams + the ADR decision log) at /QARoom/architecture/.
#
# This is the ONLY push-triggered workflow in the repo; ci.yml stays deliberately dispatch-only
# (see its header). The model site is GENERATED here with structurizr-site-generatr — that is a
# site build, NOT a test lane, so the dispatch-only discipline on ci.yml is intact. One-time owner
# action before the first run: Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/structurizr/**'
      - 'docs/adr/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          enablement: true
      - name: Stage the hand-authored overview at the site root
        run: |
          mkdir -p _site
          cp -R site/. _site/
      - name: Generate the Structurizr model site at /architecture/
        run: |
          # pinned by digest = structurizr-site-generatr v1.6.0 (reproducible). The repo root is
          # mounted so `!adrs ../adr` in workspace.dsl resolves to docs/adr. The image runs as a
          # NON-root user (`generatr`), which cannot create build/ in the runner-owned checkout —
          # so pre-create the output dir world-writable before the container writes into it.
          mkdir -p build/site && chmod -R 777 build
          # structurizr-site-generatr reads each ADR filename's numeric prefix as its id, so any
          # non-ADR file in docs/adr crashes the whole build (README.md parses "READ" -> a
          # NumberFormatException, which broke every deploy since the generated index landed). Drop
          # the generated ADR index from THIS ephemeral build only; it stays in the repo for GitHub
          # folder rendering and the adr-index gate.
          rm -f docs/adr/README.md
          docker run --rm -v "$PWD:/var/model" \
            ghcr.io/avisi-cloud/structurizr-site-generatr@sha256:dc91858de351d430e92fb0f72c1580e7827f52c37f67d1dcd8a3b4d23b34c472 \
            generate-site -w docs/structurizr/workspace.dsl
          mkdir -p _site/architecture
          cp -R build/site/. _site/architecture/
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
