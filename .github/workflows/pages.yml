# Static GitHub Pages deploy for the interactive site under `site/`.
#
# This is the ONLY push-triggered workflow in the repo, and it is scoped to `site/**`: ci.yml
# stays deliberately dispatch-only (see its header). The site is static HTML — no build step —
# so this job just uploads `site/` and deploys it. One-time owner action required before the
# first run: Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
