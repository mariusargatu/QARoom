# Reviewer agents (ADR-0026).
#
# One LLM judge per touched boundary (scripts/reviewer-agent.ts), reading that boundary's guardrail
# (its AGENTS.md) + the diff + verified evidence (caller counts, unchanged drift-gated specs, manifest
# direction, this-commit gate results) that refutes false-impact findings, posting findings to the PR
# thread for the implementation agent to fix.
# This is the piece that scales review with PR count (humans don't). Blocks Lane A on any P2+
# finding. Cost is stamped per run into test-results/reviewer-cost.json (OBSERVE-ONLY, no cap —
# ADR-0026 measure-first) and uploaded as an artifact so the per-PR $ distribution can be read off real
# runs before a ceiling is set.
#
# When no OPENAI_API_KEY is configured the model call is skipped and the workflow posts an honest
# "NOT machine-reviewed" note — it never posts a green it did not earn. Make it a required status
# check only once the judges have been meta-evaluated (ADR-0026).
name: Reviewer agents

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Skip dependabot PRs: the pipeline targets agent-authored PRs (ADR-0026), and dependabot runs
    # can't see the OPENAI_API_KEY Actions secret anyway (GitHub withholds it from the bot context),
    # so judging is impossible — don't post a confusing "skipped" note on every dep bump.
    if: ${{ !github.event.pull_request.draft && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-workspace

      - name: Which boundaries does this PR touch?
        id: boundaries
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Map each changed file to its module (services/<x> | packages/<x> | top dir) — the unit a
          # per-boundary judge reviews. Same notion as the classifier's boundaryOf; kept inline here
          # so this job has no dependency on the router job's outputs.
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | awk -F/ '/^(services|packages)\//{print $1"/"$2; next} {print $1}' \
            | sort -u > /tmp/boundaries.txt
          echo "Touched boundaries:" | tee -a "$GITHUB_STEP_SUMMARY"
          sed 's/^/- /' /tmp/boundaries.txt | tee -a "$GITHUB_STEP_SUMMARY"
          { echo 'list<<__EOF__'; cat /tmp/boundaries.txt; echo '__EOF__'; } >> "$GITHUB_OUTPUT"

      - name: Fetch this-commit gate results (best-effort evidence, ADR-0026)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          # The judge reads test-results/summary.json (if present) to REFUTE findings that predict a
          # gate would turn red — a "this breaks X" claim is false when X's runner is green. summary.json
          # is produced by ci.yml's verify job and uploaded as `partial-verify` on this same commit.
          # Pull it best-effort: if verify hasn't finished, the judge still has caller counts + spec
          # stability, so never fail the review for missing gate evidence.
          mkdir -p test-results
          run_id=$(gh run list --workflow ci.yml --json databaseId,headSha,status \
            --jq 'map(select(.headSha=="'"$HEAD_SHA"'" and .status=="completed")) | .[0].databaseId' 2>/dev/null || true)
          if [ -z "${run_id:-}" ]; then
            echo "::notice::no completed ci.yml run for $HEAD_SHA yet — judging without gate evidence."
            exit 0
          fi
          if gh run download "$run_id" -n partial-verify -D /tmp/verify-summary 2>/dev/null \
            && cp /tmp/verify-summary/summary.json test-results/summary.json; then
            echo "::notice::gate evidence loaded from ci.yml run $run_id."
          else
            echo "::notice::partial-verify artifact unavailable — judging without gate evidence."
          fi

      - name: Run per-boundary judges
        id: judge
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            {
              echo "## 🤖 Reviewer agents — skipped"
              echo
              echo "No \`OPENAI_API_KEY\` is configured, so no model judged this PR. **It was not"
              echo "machine-reviewed** — route it through the human lanes (B/C) until a key is set"
              echo "(ADR-0026). I never post a green I didn't earn."
              echo
              echo "Boundaries that *would* be reviewed:"
              sed 's/^/- /' /tmp/boundaries.txt
            } > /tmp/reviewer-note.md
            gh pr comment "$PR" --body-file /tmp/reviewer-note.md
            echo "::notice::reviewer-agents — model call skipped (no OPENAI_API_KEY)."
            exit 0
          fi
          # One judge per boundary. Each appends its cost to test-results/reviewer-cost.json and
          # prints {boundary, blocked, findings, usd} to stdout; a P0–P2 finding exits it non-zero.
          # We capture each judge's JSON line to build one human-readable PR comment, and accumulate
          # `blocked` so the job (and Lane A) fails if ANY boundary is blocked.
          blocked=0
          : > /tmp/judge-out.jsonl
          while IFS= read -r b; do
            [ -n "$b" ] || continue
            if out=$(pnpm tsx scripts/reviewer-agent.ts "$b" "$BASE_SHA" "$HEAD_SHA"); then :; else blocked=1; fi
            printf '%s\n' "$out" | tail -1 >> /tmp/judge-out.jsonl
          done < /tmp/boundaries.txt
          # `fromjson? // empty` keeps only the well-formed judge lines, so a crashed judge can't
          # break the comment (it already flipped `blocked`).
          j() { jq -R 'fromjson? // empty' /tmp/judge-out.jsonl; }
          nf=$(j | jq -s '[.[].findings | length] | add // 0')
          nb=$(j | jq -s '[.[] | select(.blocked)] | length')
          cost=$(j | jq -s '[.[].usd] | add // 0')
          model=$(jq -r '.[0].model // "gpt-5-mini"' test-results/reviewer-cost.json 2>/dev/null || echo gpt-5-mini)
          {
            echo "## 🤖 Reviewer agents"
            echo
            echo "One LLM judge per touched boundary read that boundary's \`AGENTS.md\` guardrail against"
            echo "this diff. Findings rated **P0–P2 block Lane A**; **P3** is style and never blocks."
            echo
            printf '**%s finding(s)** · **%s blocking** · model `%s` · cost **$%.4f** (observe-only).\n' \
              "$nf" "$nb" "$model" "$cost"
            echo
            if [ "$nf" -gt 0 ]; then
              echo "| severity | where | rule | why |"
              echo "|---|---|---|---|"
              j | jq -rs '.[] | .findings[] | "| \(.severity) | `\(.file):\(.line)` | \(.rule) | \(.why) |"'
              echo
            fi
            if [ "$nb" -gt 0 ]; then
              echo "⛔ **Lane A is held** until the blocking (P0–P2) findings are resolved."
            else
              echo "✅ No blocking findings — nothing here stops an auto-merge."
            fi
          } > /tmp/reviewer-summary.md
          gh pr comment "$PR" --body-file /tmp/reviewer-summary.md
          [ "$blocked" -eq 0 ] || { echo "::error::reviewer-agents found P0–P2 findings — Lane A blocked."; exit 1; }

      - name: Upload reviewer cost ledger (measure-first, ADR-0026)
        if: ${{ always() && hashFiles('test-results/reviewer-cost.json') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reviewer-cost
          path: test-results/reviewer-cost.json
