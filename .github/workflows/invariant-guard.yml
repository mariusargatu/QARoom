# Invariant-source guard (verifiable-invariants experiment, ADR-0024 Phase 4).
#
# ADVISORY, not blocking. It flags any PR that touches an INVARIANT SOURCE (the Zod contract
# authority, the formal specs, the falsifiable-claim manifests) by printing the diff and emitting a
# warning, so a reviewer is reminded: invariant sources are not edited to make a check pass — a
# change here needs an ADR and human sign-off (see AGENTS.md "Invariant sources").
#
# Like pages.yml, this runs NO build/test lane — it only inspects the diff — so the deliberate
# dispatch-only discipline on ci.yml (its build/test lanes) stays intact. The HARD gate is CODEOWNERS
# + branch protection ("Require review from Code Owners"); this job is the visible flag next to it.
name: Invariant guard

on:
  pull_request:
    paths:
      - 'packages/contracts/**'
      - 'spec/**'
      - 'scripts/lib/manifests/claims.ts'
      - 'scripts/lib/manifests/detection-matrix.ts'
      - 'scripts/lib/manifests/boundary-registry.ts'
      # The derivation chain (T23, ADR-0033): the deriver + mutation config + prove/teeth harness that
      # hang off the codeowned source. Weakening one quietly weakens the chain below the source.
      - 'packages/testing-utils/src/generators/**'
      - 'packages/testing-utils/src/agentic/**'
      - 'scripts/stryker-critical.ts'
      - 'scripts/stryker-harness.ts'
      - '**/stryker.config.json'
      - 'scripts/prove.ts'
      - 'scripts/prove-adversarial.ts'
      - 'scripts/claims-verify.ts'
      - 'scripts/deriver-conformance.ts'
      - 'scripts/lib/claim-evidence.ts'
      # The promotion-ledger verdict logic (T24, ADR-0037): the measure green_head trusts is itself a
      # Goodhart target, so it sits under the same invariant-source governance.
      - 'packages/promotion-ledger/src/verdict.ts'
      - 'packages/promotion-ledger/src/green-head.ts'
      - 'packages/promotion-ledger/src/ledger.ts'
      - 'docs/adr/0001-foundational-decisions.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  flag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Flag invariant-source changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # This diff filter MUST list the same paths as `on.pull_request.paths` above (a path that
          # triggers the workflow but is absent here silently escapes the flag — the exact bug that hid
          # `**/stryker.config.json`). scripts/invariant-guard-paths.test.ts asserts on.paths == PATHS
          # (both normalized) and that both are a subset of CODEOWNERS, so the two lists can't drift
          # again. `:(glob)**/stryker.config.json` uses git glob magic so `**` matches any depth even
          # under the shell's unquoted expansion (globstar is off; a bare `**/…` would match nothing).
          PATHS='packages/contracts/ spec/ scripts/lib/manifests/claims.ts scripts/lib/manifests/detection-matrix.ts scripts/lib/manifests/boundary-registry.ts packages/testing-utils/src/generators/ packages/testing-utils/src/agentic/ scripts/stryker-critical.ts scripts/stryker-harness.ts :(glob)**/stryker.config.json scripts/prove.ts scripts/prove-adversarial.ts scripts/claims-verify.ts scripts/deriver-conformance.ts scripts/lib/claim-evidence.ts packages/promotion-ledger/src/verdict.ts packages/promotion-ledger/src/green-head.ts packages/promotion-ledger/src/ledger.ts docs/adr/0001-foundational-decisions.md'
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- $PATHS || true)
          if [ -z "$changed" ]; then
            echo "No invariant sources touched." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## :rotating_light: This PR edits invariant sources"
            echo
            echo "These are single-source-of-truth definitions. Per ADR-0024 / AGENTS.md, an invariant"
            echo "source is **not** edited to make a check pass — a deliberate change needs an ADR and"
            echo "human (Code Owner) sign-off. Confirm the derived enforcements still follow."
            echo
            echo '### Files'
            echo '```'
            echo "$changed"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
          # A non-fatal warning annotation per file (advisory — never fails the PR).
          while IFS= read -r f; do
            [ -n "$f" ] && echo "::warning file=$f::Invariant source changed — ADR + Code Owner review required (ADR-0024)."
          done <<< "$changed"
          # Also post a plain-English comment on the PR thread, so a human reading the conversation
          # (not the Checks tab) sees the flag and what it asks of them.
          {
            echo "## 🔒 This PR edits an invariant source"
            echo
            echo "It changes a **single-source-of-truth** definition — a Zod contract, a formal spec, or a"
            echo "falsifiable-claim / detection-matrix manifest. Each one *derives* the enforcement below it:"
            echo "DB constraints, runtime validators, generated OpenAPI, property generators, bound assertions."
            echo "Weakening one quietly weakens every check downstream — the exact failure mode this guard exists"
            echo "to catch."
            echo
            echo "Per ADR-0024 / AGENTS.md this is a **deliberate** change: it needs an ADR and a **Code Owner**"
            echo "sign-off (you can't self-approve it), not a quiet edit to turn a red check green."
            echo
            echo '### Files'
            echo '```'
            echo "$changed"
            echo '```'
          } > /tmp/invariant-comment.md
          gh pr comment "$PR" --body-file /tmp/invariant-comment.md
          echo
          echo "### Diff"
          # `|| true`: head closes the pipe early, so git takes SIGPIPE (141); under pipefail that
          # would fail the step. This job is advisory — never let the diff print fail the PR.
          git diff "$BASE_SHA" "$HEAD_SHA" -- $PATHS | head -400 || true
