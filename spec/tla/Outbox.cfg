\* TLC configuration for Outbox.tla (verifiable-invariants Phase 3, ADR-0024; T19).
\* The committed-state twin of packages/messaging/src/outbox.ts + relay.ts.
SPECIFICATION Spec

\* Once the event is committed, published, and marked sent it is settled and has no successor —
\* a legitimate end, not a deadlock. EventuallyDelivered proves that end is always reached.
CHECK_DEADLOCK FALSE

CONSTANT MaxAttempts = 3

INVARIANT TypeOK
INVARIANT PublishedImpliesCommitted
INVARIANT SentImpliesPublished

PROPERTY EventuallyDelivered
PROPERTY CommitLeadsToSent
