\* TLC configuration for WebhookDelivery.tla (verifiable-invariants Phase 3, ADR-0024).
\* MaxAttempts mirrors WEBHOOK_RETRY_POLICY.max_attempts (packages/contracts/src/webhook-retry.ts).
SPECIFICATION Spec

\* Terminal states (Delivered / DeadLettered) have no successor — that is a legitimate end, not a
