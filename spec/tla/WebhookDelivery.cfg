CHECK_DEADLOCK FALSE

CONSTANT MaxAttempts = 8

INVARIANT TypeOK
INVARIANT NoSilentDrop
INVARIANT ExhaustionLegit
INVARIANT NoStuckDelivery

PROPERTY EventuallyTerminal
