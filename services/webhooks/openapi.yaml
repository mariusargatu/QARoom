openapi: 3.0.3
info:
  title: QARoom webhooks-service
  version: 0.0.0
  description: Outbound webhook subscriptions and delivery of QARoom events to external subscribers (at-least-once, retry/backoff, HMAC). Generated from Zod — do not edit by hand.
paths:
  /api/communities/{communityId}/webhook-subscriptions:
    post:
      operationId: createWebhook
      summary: Register a webhook subscription
      description: Registers an external https endpoint to receive a community’s events. Returns the write-once signing secret. Idempotent on Idempotency-Key.
      responses:
        "201":
          description: The created subscription, including the write-once secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscriptionWithSecret"
              example:
                id: whsub_01HZY0K7M3QF8VN2J5RX9TB4CM
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                url: https://hooks.example.com/qaroom
                event_types:
                  - post.created
                  - donation.state.changed
                status: Active
                created_at: 2026-05-28T12:00:00.000Z
                updated_at: 2026-05-28T12:00:00.000Z
                secret: whsec_…
          links:
            GetWebhook:
              operationId: getWebhook
              parameters:
                communityId: $response.body#/community_id
                subscriptionId: $response.body#/id
              description: Fetch the affected subscription.
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: validation
        "409":
          description: This Idempotency-Key was already used for a request with a different body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/idempotency-key-conflict
                title: Idempotency-Key reused with a different body
                status: 409
                detail: Idempotency-Key reused with a different body.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: conflict
        "422":
          description: The delivery URL must be https and must not target a loopback/private/link-local host (SSRF guard).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/webhook-url-invalid
                title: Webhook URL is not a public https endpoint
                status: 422
                detail: Webhook URL is not a public https endpoint.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: validation
      tags:
        - webhooks
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
            example:
              url: https://hooks.example.com/qaroom
              event_types:
                - post.created
                - donation.state.changed
    get:
      operationId: listWebhooks
      summary: List a community’s webhook subscriptions
      description: Returns every webhook subscription registered in a community.
      responses:
        "200":
          description: The community’s subscriptions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscriptionList"
              example:
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                webhooks:
                  - id: whsub_01HZY0K7M3QF8VN2J5RX9TB4CM
                    community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                    url: https://hooks.example.com/qaroom
                    event_types:
                      - post.created
                      - donation.state.changed
                    status: Active
                    created_at: 2026-05-28T12:00:00.000Z
                    updated_at: 2026-05-28T12:00:00.000Z
        "400":
          description: The community id in the path is malformed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: validation
      tags:
        - webhooks
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
  /api/communities/{communityId}/webhook-subscriptions/{subscriptionId}:
    get:
      operationId: getWebhook
      summary: Get a single webhook subscription
      description: Returns a subscription by id within a community (the secret is never returned).
      responses:
        "200":
          description: The subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscription"
              example:
                id: whsub_01HZY0K7M3QF8VN2J5RX9TB4CM
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                url: https://hooks.example.com/qaroom
                event_types:
                  - post.created
                  - donation.state.changed
                status: Active
                created_at: 2026-05-28T12:00:00.000Z
                updated_at: 2026-05-28T12:00:00.000Z
        "400":
          description: The community id or subscription id in the path is malformed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: validation
        "404":
          description: No subscription with that id exists in this community.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/webhook-not-found
                title: Webhook subscription not found
                status: 404
                detail: Webhook subscription not found.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: not_found
      tags:
        - webhooks
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: subscriptionId
          in: path
          required: true
          description: Target subscription.
          schema:
            type: string
            pattern: ^whsub_[0-9A-HJKMNP-TV-Z]{26}$
    delete:
      operationId: deleteWebhook
      summary: Delete a webhook subscription
      description: Removes a subscription. Idempotent on Idempotency-Key.
      responses:
        "204":
          description: The subscription was deleted.
          links:
            ListWebhooks:
              operationId: listWebhooks
              parameters:
                communityId: $request.path.communityId
              description: List the remaining subscriptions.
        "404":
          description: No subscription with that id exists in this community.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/webhook-not-found
                title: Webhook subscription not found
                status: 404
                detail: Webhook subscription not found.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: not_found
      tags:
        - webhooks
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: subscriptionId
          in: path
          required: true
          description: Target subscription.
          schema:
            type: string
            pattern: ^whsub_[0-9A-HJKMNP-TV-Z]{26}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
  /api/communities/{communityId}/webhook-subscriptions/{subscriptionId}/pause:
    post:
      operationId: pauseWebhook
      summary: Pause a webhook subscription
      description: Pauses an Active subscription so no new deliveries are enqueued. Idempotent on Idempotency-Key.
      responses:
        "200":
          description: The paused subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscription"
              example:
                id: whsub_01HZY0K7M3QF8VN2J5RX9TB4CM
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                url: https://hooks.example.com/qaroom
                event_types:
                  - post.created
                  - donation.state.changed
                status: Paused
                created_at: 2026-05-28T12:00:00.000Z
                updated_at: 2026-05-28T12:00:00.000Z
          links:
            GetWebhook:
              operationId: getWebhook
              parameters:
                communityId: $response.body#/community_id
                subscriptionId: $response.body#/id
              description: Fetch the affected subscription.
        "404":
          description: No subscription with that id exists in this community.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/webhook-not-found
                title: Webhook subscription not found
                status: 404
                detail: Webhook subscription not found.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: not_found
        "409":
          description: The subscription cannot move to the requested status from its current status.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/webhook-illegal-transition
                title: Illegal subscription status transition
                status: 409
                detail: Illegal subscription status transition.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: conflict
      tags:
        - webhooks
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: subscriptionId
          in: path
          required: true
          description: Target subscription.
          schema:
            type: string
            pattern: ^whsub_[0-9A-HJKMNP-TV-Z]{26}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
  /api/communities/{communityId}/webhook-subscriptions/{subscriptionId}/resume:
    post:
      operationId: resumeWebhook
      summary: Resume a webhook subscription
      description: Resumes a Paused subscription. Idempotent on Idempotency-Key.
      responses:
        "200":
          description: The resumed subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscription"
              example:
                id: whsub_01HZY0K7M3QF8VN2J5RX9TB4CM
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                url: https://hooks.example.com/qaroom
                event_types:
                  - post.created
                  - donation.state.changed
                status: Active
                created_at: 2026-05-28T12:00:00.000Z
                updated_at: 2026-05-28T12:00:00.000Z
          links:
            GetWebhook:
              operationId: getWebhook
              parameters:
                communityId: $response.body#/community_id
                subscriptionId: $response.body#/id
              description: Fetch the affected subscription.
        "404":
          description: No subscription with that id exists in this community.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/webhook-not-found
                title: Webhook subscription not found
                status: 404
                detail: Webhook subscription not found.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: not_found
        "409":
          description: The subscription cannot move to the requested status from its current status.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/webhook-illegal-transition
                title: Illegal subscription status transition
                status: 409
                detail: Illegal subscription status transition.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/webhook-subscriptions
                retryable: false
                next_actions: []
                failure_domain: conflict
      tags:
        - webhooks
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: subscriptionId
          in: path
          required: true
          description: Target subscription.
          schema:
            type: string
            pattern: ^whsub_[0-9A-HJKMNP-TV-Z]{26}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
