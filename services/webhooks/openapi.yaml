  /system/state:
    get:
      operationId: getSystemState
      summary: Observable state of every model
      description: Returns the current state of every model the service runs, with an as_of envelope (Commitment 7).
      responses:
        "200":
          description: Current observable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemState"
      tags:
        - system
  /system/capabilities:
    get:
      operationId: getSystemCapabilities
      summary: Operations the service exposes
      description: Returns every operation in MCP-tool-shaped form (Commitment 7).
      responses:
        "200":
          description: The capability list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
      tags:
        - system
components:
  schemas:
    AsOf:
      type: object
      properties:
        snapshot_id:
          type: string
        lamport:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        wall_clock:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - snapshot_id
        - lamport
        - wall_clock
      additionalProperties: false
      description: "Read consistency envelope: {snapshot_id, lamport, wall_clock}."
    Capabilities:
      type: object
      properties:
        service:
          type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/Capability"
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - capabilities
        - as_of
      additionalProperties: false
      description: All operations the service exposes, MCP-tool-shaped.
    Capability:
      type: object
      properties:
        operation_id:
          type: string
        method:
          type: string
        path:
          type: string
        summary:
          type: string
        description:
          type: string
        mutating:
          type: boolean
        input_schema:
          type: object
          additionalProperties: {}
      required:
        - operation_id
        - method
        - path
        - summary
        - description
        - mutating
        - input_schema
      additionalProperties: false
      description: An MCP-tool-shaped description of one operation.
    CommunityId:
      type: string
      pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: comm_<ULID>"
    CreateWebhookRequest:
      type: object
      properties:
        url:
          $ref: "#/components/schemas/WebhookUrl"
        event_types:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventType"
      required:
        - url
        - event_types
      additionalProperties: false
      description: Body for createWebhook.
    EventId:
      type: string
      pattern: ^evt_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: evt_<ULID>"
    FailureDomain:
      type: string
      enum:
        - validation
        - authentication
        - authorization
        - tenant_resolution
        - rate_limit
        - conflict
        - not_found
        - dependency_failure
        - internal_error
    NextAction:
      type: object
      properties:
        verb:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
        href:
          type: string
        description:
          type: string
      required:
        - verb
        - href
        - description
      additionalProperties: false
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          description: Absolute URI identifying the problem type.
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        retryable:
          type: boolean
        next_actions:
          type: array
          items:
            $ref: "#/components/schemas/NextAction"
        failure_domain:
          $ref: "#/components/schemas/FailureDomain"
      required:
        - type
        - title
        - status
        - retryable
        - next_actions
        - failure_domain
      additionalProperties: false
      description: RFC 7807 Problem Details with QARoom agent extensions.
    SystemState:
      type: object
      properties:
        service:
          type: string
        models:
          type: object
          additionalProperties: {}
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - models
        - as_of
      additionalProperties: false
      description: Current observable state of every model the service runs.
    WebhookDelivery:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/WebhookDeliveryId"
        subscription_id:
          $ref: "#/components/schemas/WebhookSubscriptionId"
        community_id:
          $ref: "#/components/schemas/CommunityId"
        event_id:
          $ref: "#/components/schemas/EventId"
        event_type:
          $ref: "#/components/schemas/WebhookEventType"
        status:
          $ref: "#/components/schemas/WebhookDeliveryStatus"
        attempt:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        next_attempt_at:
          nullable: true
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
        last_status_code:
          nullable: true
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        created_at:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
        updated_at:
          type: string
