  /api/communities/{communityId}/webhook-subscriptions/{subscriptionId}/deliveries:
    get:
      operationId: listWebhookDeliveries
      summary: List a subscription’s deliveries
      description: Returns the delivery ledger for a subscription, newest first — the observable retry contract (attempt, next_attempt_at, status).
      responses:
        "200":
          description: A page of deliveries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveryList"
              example:
                subscription_id: whsub_01HZY0K7M3QF8VN2J5RX9TB4CM
                deliveries:
                  - id: whdel_01HZY0K7M3QF8VN2J5RX9TB4CN
                    subscription_id: whsub_01HZY0K7M3QF8VN2J5RX9TB4CM
                    community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                    event_id: evt_01HZY0K7M3QF8VN2J5RX9TB4CP
                    event_type: post.created
                    status: Delivered
                    attempt: 1
                    next_attempt_at: null
                    last_status_code: 200
                    created_at: 2026-05-28T12:00:00.000Z
                    updated_at: 2026-05-28T12:00:00.000Z
        "400":
          description: The community id or subscription id in the path is malformed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
