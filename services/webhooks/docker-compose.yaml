name: qaroom-webhooks

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: qaroom
      POSTGRES_PASSWORD: qaroom
      POSTGRES_DB: qaroom_webhooks
    ports:
      - '5436:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qaroom -d qaroom_webhooks']
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - qaroom_webhooks_pg:/var/lib/postgresql

volumes:
  qaroom_webhooks_pg:
