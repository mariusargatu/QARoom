openapi: 3.0.3
info:
  title: QARoom identity-service
  version: 0.0.0
  description: Users, communities-as-tenants, memberships, sessions, and JWT/JWKS. Generated from Zod — do not edit by hand.
paths:
  /api/users:
    post:
      operationId: createUser
      summary: Create a user
      description: Creates a user identity. Idempotent on the Idempotency-Key header.
      responses:
        "201":
          description: The created user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
                handle: ada
                display_name: Ada Lovelace
                created_at: "2026-05-28T12:00:00.000Z"
          links:
            GetCreatedUser:
              operationId: getUser
              parameters:
                userId: $response.body#/id
              description: Fetch the user that was just created.
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: validation
        "409":
          description: This Idempotency-Key was already used for a request with a different body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/idempotency-key-conflict
                title: Idempotency-Key reused with a different body
                status: 409
                detail: Idempotency-Key reused with a different body.
                instance: /api/users
                retryable: false
                next_actions: []
                failure_domain: conflict
      tags:
        - users
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            example:
              handle: ada
              display_name: Ada Lovelace
  /api/users/{userId}:
    get:
      operationId: getUser
      summary: Get a single user
      description: Returns a user identity by id.
      responses:
        "200":
          description: The user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
                handle: ada
                display_name: Ada Lovelace
                created_at: "2026-05-28T12:00:00.000Z"
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: validation
        "404":
          description: No user with that id exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/user-not-found
                title: User not found
                status: 404
                detail: User not found.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: not_found
      tags:
        - users
      parameters:
        - name: userId
          in: path
          required: true
          description: Target user.
          schema:
            type: string
            pattern: ^user_[0-9A-HJKMNP-TV-Z]{26}$
    delete:
      operationId: deleteUser
      summary: Erase a user (GDPR right-to-erasure)
      description: Erases a user across the platform. Identity deletes its own user data and stages one `user.erased` event per community the user belonged to; content- and donations-service consume those and delete their slice. Orchestrated as the erasure saga (ADR-0036); returns 202 Accepted because the cross-service cascade settles asynchronously. Idempotent on the Idempotency-Key header.
      responses:
        "202":
          description: The erasure was accepted; the cross-service cascade is in progress.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserErasureAccepted"
              example:
                saga_id: erasure_01HZY0K7M3QF8VN2J5RX9TB4CG
                user_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
                status: Cascading
                communities:
                  - comm_01HZY0K7M3QF8VN2J5RX9TB4CD
          links:
            GetErasedUser:
              operationId: getUser
              parameters:
                userId: $response.body#/user_id
              description: Fetch the erased user — once the saga settles it returns 404, the erasure made observable.
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: validation
        "404":
          description: No user with that id exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/user-not-found
                title: User not found
                status: 404
                detail: User not found.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: not_found
        "409":
          description: This Idempotency-Key was already used for a request with a different body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/idempotency-key-conflict
                title: Idempotency-Key reused with a different body
                status: 409
                detail: Idempotency-Key reused with a different body.
                instance: /api/users
                retryable: false
                next_actions: []
                failure_domain: conflict
      tags:
        - users
      parameters:
        - name: userId
          in: path
          required: true
          description: Target user.
          schema:
            type: string
            pattern: ^user_[0-9A-HJKMNP-TV-Z]{26}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
  /api/communities:
    post:
      operationId: createCommunity
      summary: Create a community (tenant)
      description: Creates a community. Idempotent on Idempotency-Key; the slug must be unique.
      responses:
        "201":
          description: The created community.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Community"
              example:
                id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                slug: general
                name: General
                created_at: "2026-05-28T12:00:00.000Z"
          links:
            ListCommunityMembers:
              operationId: listMembers
              parameters:
                communityId: $response.body#/id
              description: List the members of the community that was just created.
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: validation
        "409":
          description: This Idempotency-Key was already used for a request with a different body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/idempotency-key-conflict
                title: Idempotency-Key reused with a different body
                status: 409
                detail: Idempotency-Key reused with a different body.
                instance: /api/users
                retryable: false
                next_actions: []
                failure_domain: conflict
      tags:
        - communities
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityRequest"
            example:
              slug: general
              name: General
  /api/communities/{communityId}/members:
    post:
      operationId: addMembership
      summary: Add a member to a community
      description: Grants a user a role in a community. Idempotent on Idempotency-Key.
      responses:
        "201":
          description: The created membership.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
              example:
                user_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                role: member
                joined_at: "2026-05-28T12:00:00.000Z"
          links:
            ListCommunityMembers:
              operationId: listMembers
              parameters:
                communityId: $response.body#/community_id
              description: List the community members after adding one.
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: validation
        "404":
          description: No community with that id exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/community-not-found
                title: Community not found
                status: 404
                detail: Community not found.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/members
                retryable: false
                next_actions: []
                failure_domain: tenant_resolution
        "409":
          description: This Idempotency-Key was already used for a request with a different body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/idempotency-key-conflict
                title: Idempotency-Key reused with a different body
                status: 409
                detail: Idempotency-Key reused with a different body.
                instance: /api/users
                retryable: false
                next_actions: []
                failure_domain: conflict
      tags:
        - communities
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMembershipRequest"
            example:
              user_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
              role: member
    get:
      operationId: listMembers
      summary: List a community’s members
      description: Returns the members of a community, newest first, with a read consistency envelope.
      responses:
        "200":
          description: The community members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberList"
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: validation
        "404":
          description: No community with that id exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/community-not-found
                title: Community not found
                status: 404
                detail: Community not found.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/members
                retryable: false
                next_actions: []
                failure_domain: tenant_resolution
      tags:
        - communities
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
  /api/sessions:
    post:
      operationId: createSession
      summary: Create a session (issue an access token)
      description: Issues a short-lived ES256 access token for a user. Idempotent on Idempotency-Key.
      responses:
        "201":
          description: The issued access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokenResponse"
              example:
                session_id: sess_01HZY0K7M3QF8VN2J5RX9TB4CG
                access_token: eyJhbGciOiJFUzI1NiIsImtpZCI6ImtleV8wMSJ9.eyJzdWIiOiJ1c2VyXzAxIn0.sig
                token_type: Bearer
                expires_at: "2026-05-28T12:00:00.000Z"
                kid: key_01HZY0K7M3QF8VN2J5RX9TB4CH
          links:
            FetchJwks:
              operationId: getJwks
              description: Fetch the JWKS to verify the issued token’s signature.
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: validation
        "404":
          description: No user with that id exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/user-not-found
                title: User not found
                status: 404
                detail: User not found.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: not_found
        "409":
          description: This Idempotency-Key was already used for a request with a different body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/idempotency-key-conflict
                title: Idempotency-Key reused with a different body
                status: 409
                detail: Idempotency-Key reused with a different body.
                instance: /api/users
                retryable: false
                next_actions: []
                failure_domain: conflict
      tags:
        - sessions
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
            example:
              user_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
  /ws/tickets:
    post:
      operationId: createWsTicket
      summary: Mint a one-use WebSocket handshake ticket
      description: Issues a one-use, 30-second ticket bound to the authenticated principal. Present it in the WebSocket subprotocol (`ticket.<ticket>`). Deliberately not idempotent — each call mints a fresh ticket (ADR-0013).
      responses:
        "201":
          description: A freshly minted ticket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
              example:
                ticket: tkt_01HZY0K7M3QF8VN2J5RX9TB4CK
                expires_in_seconds: 30
        "401":
          description: A valid Bearer access token is required.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/missing-bearer-token
                title: Authentication failed
                status: 401
                detail: Authentication failed.
                instance: /ws/tickets
                retryable: false
                next_actions: []
                failure_domain: authentication
      tags:
        - ws
      parameters:
        - name: Authorization
          in: header
          required: true
          description: Bearer access token (the JWT minted by createSession).
          schema:
            type: string
            pattern: ^Bearer .+$
  /ws/tickets/redeem:
    post:
      operationId: redeemWsTicket
      summary: Redeem a WebSocket ticket (internal, gateway → identity)
      description: Consumes a ticket exactly once and returns the principal it authorizes. Called by the gateway before upgrading a WebSocket connection. An unknown, expired, or already-redeemed ticket is a 401.
      responses:
        "200":
          description: The principal the ticket authorizes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemTicketResponse"
              example:
                user_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
                memberships:
                  - community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                    role: member
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/users/user_01HZY0K7M3QF8VN2J5RX9TB4CF
                retryable: false
                next_actions: []
                failure_domain: validation
        "401":
          description: The ticket is unknown, expired, or already redeemed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/ticket-invalid
                title: Authentication failed
                status: 401
                detail: Authentication failed.
                instance: /ws/tickets/redeem
                retryable: false
                next_actions: []
                failure_domain: authentication
      tags:
        - ws
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemTicketRequest"
            example:
              ticket: tkt_01HZY0K7M3QF8VN2J5RX9TB4CK
  /jwks.json:
    get:
      operationId: getJwks
      summary: JSON Web Key Set
      description: Returns the JWKS-eligible public keys (current plus in-grace previous keys) for ES256 verification.
      responses:
        "200":
          description: The JWKS.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Jwks"
              example:
                keys:
                  - kty: EC
                    crv: P-256
                    x: MKBCTNIcKUSDii11ySs3526iDZ8AiTo7Tu6KPAqv7D4
                    "y": 4Etl6SRW2YiLUrN5vfvVHuhp7x8PxltmWWlbbM4IFyM
                    kid: key_01HZY0K7M3QF8VN2J5RX9TB4CH
                    use: sig
                    alg: ES256
      tags:
        - jwks
  /system/state:
    get:
      operationId: getSystemState
      summary: Observable state of every model
      description: Returns the current state of every model the service runs, with an as_of envelope (Commitment 7).
      responses:
        "200":
          description: Current observable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemState"
      tags:
        - system
  /system/capabilities:
    get:
      operationId: getSystemCapabilities
      summary: Operations the service exposes
      description: Returns every operation in MCP-tool-shaped form (Commitment 7).
      responses:
        "200":
          description: The capability list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
      tags:
        - system
components:
  schemas:
    AccessTokenResponse:
      type: object
      properties:
        session_id:
          $ref: "#/components/schemas/SessionId"
        access_token:
          type: string
        token_type:
          type: string
          enum:
            - Bearer
        expires_at:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
        kid:
          type: string
      required:
        - session_id
        - access_token
        - token_type
        - expires_at
        - kid
      additionalProperties: false
      description: Issued access token and its signing kid.
    AddMembershipRequest:
      type: object
      properties:
        user_id:
          $ref: "#/components/schemas/UserId"
        role:
          $ref: "#/components/schemas/Role"
      required:
        - user_id
        - role
      additionalProperties: false
      description: Body for addMembership.
    AsOf:
      type: object
      properties:
        snapshot_id:
          type: string
        lamport:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        wall_clock:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - snapshot_id
        - lamport
        - wall_clock
      additionalProperties: false
      description: "Read consistency envelope: {snapshot_id, lamport, wall_clock}."
    Capabilities:
      type: object
      properties:
        service:
          type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/Capability"
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - capabilities
        - as_of
      additionalProperties: false
      description: All operations the service exposes, MCP-tool-shaped.
    Capability:
      type: object
      properties:
        operation_id:
          type: string
        method:
          type: string
        path:
          type: string
        summary:
          type: string
        description:
          type: string
        mutating:
          type: boolean
        input_schema:
          type: object
          additionalProperties: {}
      required:
        - operation_id
        - method
        - path
        - summary
        - description
        - mutating
        - input_schema
      additionalProperties: false
      description: An MCP-tool-shaped description of one operation.
    Community:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/CommunityId"
        slug:
          type: string
          minLength: 2
          maxLength: 64
          pattern: ^[a-z0-9_]+$
        name:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^[^\x00]*$
        created_at:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - id
        - slug
        - name
        - created_at
      additionalProperties: false
      description: A community (tenant) in the identity registry.
    CommunityId:
      type: string
      pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: comm_<ULID>"
    CreateCommunityRequest:
      type: object
      properties:
        slug:
          type: string
          minLength: 2
          maxLength: 64
          pattern: ^[a-z0-9_]+$
        name:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^[^\x00]*$
      required:
        - slug
        - name
      additionalProperties: false
      description: Body for createCommunity.
    CreateSessionRequest:
      type: object
      properties:
        user_id:
          $ref: "#/components/schemas/UserId"
      required:
        - user_id
      additionalProperties: false
      description: Body for createSession.
    CreateUserRequest:
      type: object
      properties:
        handle:
          type: string
          minLength: 2
          maxLength: 40
          pattern: ^[a-z0-9_]+$
        display_name:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^[^\x00]*$
      required:
        - handle
        - display_name
      additionalProperties: false
      description: Body for createUser.
    FailureDomain:
      type: string
      enum:
        - validation
        - authentication
        - authorization
        - tenant_resolution
        - rate_limit
        - conflict
        - not_found
        - dependency_failure
        - internal_error
    Jwk:
      type: object
      properties:
        kty:
          type: string
          enum:
            - EC
        crv:
          type: string
          enum:
            - P-256
        x:
          type: string
        "y":
          type: string
        kid:
          type: string
        use:
          type: string
          enum:
            - sig
        alg:
          type: string
          enum:
            - ES256
      required:
        - kty
        - crv
        - x
        - "y"
        - kid
        - use
        - alg
      additionalProperties: false
      description: Public EC P-256 JWK for ES256 verification.
    Jwks:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/Jwk"
      required:
        - keys
      additionalProperties: false
      description: "JSON Web Key Set: the JWKS-eligible public keys."
    MemberList:
      type: object
      properties:
        community_id:
          $ref: "#/components/schemas/CommunityId"
        members:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - community_id
        - members
        - as_of
      additionalProperties: false
      description: Members of a community with a read envelope.
    Membership:
      type: object
      properties:
        user_id:
          $ref: "#/components/schemas/UserId"
        community_id:
          $ref: "#/components/schemas/CommunityId"
        role:
          $ref: "#/components/schemas/Role"
        joined_at:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - user_id
        - community_id
        - role
        - joined_at
      additionalProperties: false
      description: A user↔community↔role grant.
    MembershipClaim:
      type: object
      properties:
        community_id:
          $ref: "#/components/schemas/CommunityId"
        role:
          $ref: "#/components/schemas/Role"
      required:
        - community_id
        - role
      additionalProperties: false
      description: A {community_id, role} pair in the access token.
    NextAction:
      type: object
      properties:
        verb:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
        href:
          type: string
        description:
          type: string
      required:
        - verb
        - href
        - description
      additionalProperties: false
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          description: Absolute URI identifying the problem type.
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        retryable:
          type: boolean
        next_actions:
          type: array
          items:
            $ref: "#/components/schemas/NextAction"
        failure_domain:
          $ref: "#/components/schemas/FailureDomain"
      required:
        - type
        - title
        - status
        - retryable
        - next_actions
        - failure_domain
      additionalProperties: false
      description: RFC 7807 Problem Details with QARoom agent extensions.
    RedeemTicketRequest:
      type: object
      properties:
        ticket:
          $ref: "#/components/schemas/TicketId"
      required:
        - ticket
      additionalProperties: false
      description: Body for the internal ticket redeem call.
    RedeemTicketResponse:
      type: object
      properties:
        user_id:
          $ref: "#/components/schemas/UserId"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipClaim"
      required:
        - user_id
        - memberships
      additionalProperties: false
      description: The principal a redeemed ticket authorizes.
    Role:
      type: string
      enum:
        - owner
        - moderator
        - member
      description: Membership role within a community.
    SessionId:
      type: string
      pattern: ^sess_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: sess_<ULID>"
    SystemState:
      type: object
      properties:
        service:
          type: string
        models:
          type: object
          additionalProperties: {}
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - models
        - as_of
      additionalProperties: false
      description: Current observable state of every model the service runs.
    TicketId:
      type: string
      pattern: ^tkt_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: tkt_<ULID>"
    TicketResponse:
      type: object
      properties:
        ticket:
          $ref: "#/components/schemas/TicketId"
        expires_in_seconds:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          maximum: 9007199254740991
      required:
        - ticket
        - expires_in_seconds
      additionalProperties: false
      description: A freshly minted WebSocket handshake ticket.
    User:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UserId"
        handle:
          type: string
          minLength: 2
          maxLength: 40
          pattern: ^[a-z0-9_]+$
        display_name:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^[^\x00]*$
        created_at:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - id
        - handle
        - display_name
        - created_at
      additionalProperties: false
      description: A user identity.
    UserErasureAccepted:
      type: object
      properties:
        saga_id:
          type: string
        user_id:
          $ref: "#/components/schemas/UserId"
        status:
          type: string
          enum:
            - Cascading
        communities:
          type: array
          items:
            type: string
      required:
        - saga_id
        - user_id
        - status
        - communities
      additionalProperties: false
      description: Acknowledges an accepted user-erasure saga.
    UserId:
      type: string
      pattern: ^user_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: user_<ULID>"
