                status: 409
                detail: Illegal rollout transition.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: conflict
        "429":
          description: The per-principal rate limit was exceeded. Carries a Retry-After header.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/rate-limited
