                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/donations-not-enabled
                title: Donations are not enabled
                status: 409
                detail: Donations are not enabled.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: conflict
        "429":
          description: The per-principal rate limit was exceeded. Carries a Retry-After header.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/rate-limited
                title: Too many requests
                status: 429
                detail: Too many requests.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: rate_limit
        "502":
          description: donations-service is unreachable, timed out, or the gateway circuit breaker is open (chaos experiments 06/07). The upstream payment-provider 502 is also surfaced here.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/donations-unreachable
                title: Upstream donations-service unavailable
                status: 502
                detail: Upstream donations-service unavailable.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: dependency_failure
      tags:
        - donations
      parameters:
