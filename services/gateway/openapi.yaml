openapi: 3.0.3
info:
  title: QARoom gateway
  version: 0.0.0
  description: External API gateway fronting content-service. Generated from Zod — do not edit by hand.
paths:
  /api/communities/{communityId}/posts:
    post:
      operationId: createPost
      summary: Create a post (proxied to content-service)
      description: Validates at the edge, forwards to content-service. Idempotent on the Idempotency-Key header.
      responses:
        "201":
          description: The created post.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
              example:
                id: post_01HZY0K7M3QF8VN2J5RX9TB4CE
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                author_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
                title: Why deterministic clocks matter
                body: A short note on testability.
                score: 0
                created_at: 2026-05-28T12:00:00.000Z
          links:
            GetCreatedPost:
              operationId: getPost
              parameters:
                postId: $response.body#/id
              description: Fetch the post that was just created.
        "400":
          description: The request failed validation at the gateway edge.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: validation
        "429":
          description: The per-principal rate limit was exceeded. Carries a Retry-After header.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/rate-limited
                title: Too many requests
                status: 429
                detail: Too many requests.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: rate_limit
        "502":
          description: content-service is unreachable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/content-unreachable
                title: Upstream content-service unavailable
                status: 502
                detail: Upstream content-service unavailable.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: dependency_failure
      tags:
        - posts
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
            example:
              author_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
              title: Why deterministic clocks matter
              body: A short note on testability.
  /api/communities/{communityId}/feed:
    get:
      operationId: listCommunityFeed
      summary: List a community feed (proxied)
      description: Returns the most recent posts in a community, newest first, via content-service.
      responses:
        "200":
          description: A page of community posts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feed"
        "400":
          description: The request failed validation at the gateway edge.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: validation
        "429":
          description: The per-principal rate limit was exceeded. Carries a Retry-After header.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/rate-limited
                title: Too many requests
                status: 429
                detail: Too many requests.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: rate_limit
        "502":
          description: content-service is unreachable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/content-unreachable
                title: Upstream content-service unavailable
                status: 502
                detail: Upstream content-service unavailable.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: dependency_failure
      tags:
        - posts
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
  /api/posts/{postId}:
    get:
      operationId: getPost
      summary: Get a single post (proxied)
      description: Returns a post by id via content-service.
      responses:
        "200":
          description: The post.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
              example:
                id: post_01HZY0K7M3QF8VN2J5RX9TB4CE
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                author_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
                title: Why deterministic clocks matter
                body: A short note on testability.
                score: 0
                created_at: 2026-05-28T12:00:00.000Z
        "400":
          description: The request failed validation at the gateway edge.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: validation
        "404":
          description: The upstream resource does not exist.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/post-not-found
                title: Post not found
                status: 404
                detail: Post not found.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: not_found
        "429":
          description: The per-principal rate limit was exceeded. Carries a Retry-After header.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/rate-limited
                title: Too many requests
                status: 429
                detail: Too many requests.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: rate_limit
        "502":
          description: content-service is unreachable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/content-unreachable
                title: Upstream content-service unavailable
                status: 502
                detail: Upstream content-service unavailable.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: dependency_failure
      tags:
        - posts
      parameters:
        - name: postId
          in: path
          required: true
          description: Target post.
          schema:
            type: string
            pattern: ^post_[0-9A-HJKMNP-TV-Z]{26}$
  /api/posts/{postId}/votes:
    post:
      operationId: castVote
      summary: Cast a vote on a post (proxied)
      description: Casts or changes a vote (+1 / -1) via content-service. Idempotent on Idempotency-Key.
      responses:
        "200":
          description: The recomputed post score.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CastVoteResponse"
              example:
                post_id: post_01HZY0K7M3QF8VN2J5RX9TB4CE
                score: 1
                voter_value: 1
          links:
            GetVotedPost:
              operationId: getPost
              parameters:
                postId: $response.body#/post_id
              description: Fetch the post that was voted on.
        "400":
          description: The request failed validation at the gateway edge.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: validation
        "404":
          description: The upstream resource does not exist.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/post-not-found
                title: Post not found
                status: 404
                detail: Post not found.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: not_found
        "429":
          description: The per-principal rate limit was exceeded. Carries a Retry-After header.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/rate-limited
                title: Too many requests
                status: 429
                detail: Too many requests.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: rate_limit
        "502":
          description: content-service is unreachable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/content-unreachable
                title: Upstream content-service unavailable
                status: 502
                detail: Upstream content-service unavailable.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: dependency_failure
      tags:
        - votes
      parameters:
        - name: postId
          in: path
          required: true
          description: Target post.
          schema:
            type: string
            pattern: ^post_[0-9A-HJKMNP-TV-Z]{26}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CastVoteRequest"
            example:
              voter_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
              value: 1
  /api/communities/{communityId}/events:
    get:
      operationId: listEvents
      summary: Poll community events (WebSocket fallback)
      description: Returns the push envelopes for a community after the given seq cursor — the polling fallback for the WebSocket stream (Commitment 11). Every event delivered over WS is also returned here.
      responses:
        "200":
          description: A page of push envelopes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPage"
        "400":
          description: The request failed validation at the gateway edge.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: validation
        "429":
          description: The per-principal rate limit was exceeded. Carries a Retry-After header.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/rate-limited
                title: Too many requests
                status: 429
                detail: Too many requests.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: rate_limit
      tags:
        - events
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: after
          in: query
          required: false
          description: Return only envelopes with seq greater than this cursor.
          schema:
            type: integer
            minimum: 0
  /system/state:
    get:
      operationId: getSystemState
      summary: Observable state of the gateway
      description: Returns the gateway’s observable state with an as_of envelope (Commitment 7).
      responses:
        "200":
          description: Current observable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemState"
      tags:
        - system
  /system/capabilities:
    get:
      operationId: getSystemCapabilities
      summary: Operations the gateway exposes
      description: Returns every operation in MCP-tool-shaped form (Commitment 7).
      responses:
        "200":
          description: The capability list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
      tags:
        - system
  /system/limits:
    get:
      operationId: getSystemLimits
      summary: Per-principal rate-limit usage
      description: Returns the calling principal’s current rate-limit usage and time to full refill.
      responses:
        "200":
          description: Current rate-limit usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemLimits"
      tags:
        - system
components:
  schemas:
    AsOf:
      type: object
      properties:
        snapshot_id:
          type: string
        lamport:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        wall_clock:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - snapshot_id
        - lamport
        - wall_clock
      additionalProperties: false
      description: "Read consistency envelope: {snapshot_id, lamport, wall_clock}."
    Capabilities:
      type: object
      properties:
        service:
          type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/Capability"
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - capabilities
        - as_of
      additionalProperties: false
      description: All operations the service exposes, MCP-tool-shaped.
    Capability:
      type: object
      properties:
        operation_id:
          type: string
        method:
          type: string
        path:
          type: string
        summary:
          type: string
        description:
          type: string
        mutating:
          type: boolean
        input_schema:
          type: object
          additionalProperties: {}
      required:
        - operation_id
        - method
        - path
        - summary
        - description
        - mutating
        - input_schema
      additionalProperties: false
      description: An MCP-tool-shaped description of one operation.
    CastVoteRequest:
      type: object
      properties:
        voter_id:
          $ref: "#/components/schemas/UserId"
        value:
          $ref: "#/components/schemas/VoteValue"
      required:
        - voter_id
        - value
      additionalProperties: false
      description: Body for castVote.
    CastVoteResponse:
      type: object
      properties:
        post_id:
          $ref: "#/components/schemas/PostId"
        score:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        voter_value:
          $ref: "#/components/schemas/VoteValue"
      required:
        - post_id
        - score
        - voter_value
      additionalProperties: false
      description: Resulting post score after a vote.
    CommunityId:
      type: string
      pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: comm_<ULID>"
    CreatePostRequest:
      type: object
      properties:
        author_id:
          $ref: "#/components/schemas/UserId"
        title:
          type: string
          minLength: 1
          maxLength: 300
          pattern: ^[^\x00]*$
        body:
          type: string
          maxLength: 40000
          pattern: ^[^\x00]*$
      required:
        - author_id
        - title
        - body
      additionalProperties: false
      description: Body for createPost.
    DonationId:
      type: string
      pattern: ^dntn_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: dntn_<ULID>"
    DonationStatus:
      type: string
      enum:
        - Pending
        - Authorized
        - Captured
        - Failed
        - Refunded
      description: Lifecycle status of a donation.
    EventPage:
      type: object
      properties:
        community_id:
          $ref: "#/components/schemas/CommunityId"
        events:
          type: array
          items:
            $ref: "#/components/schemas/WsEnvelope"
        cursor:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - community_id
        - events
        - cursor
      additionalProperties: false
      description: A page of push envelopes from the polling fallback.
    FailureDomain:
      type: string
      enum:
        - validation
        - authentication
        - authorization
        - tenant_resolution
        - rate_limit
        - conflict
        - not_found
        - dependency_failure
        - internal_error
    Feed:
      type: object
      properties:
        community_id:
          $ref: "#/components/schemas/CommunityId"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - community_id
        - posts
        - as_of
      additionalProperties: false
      description: A community feed page with a read envelope.
    FlagKey:
      type: string
      pattern: ^[a-z][a-z0-9-]{1,63}$
      description: A lowercase, hyphen-separated feature-flag key.
    FlagState:
      type: string
      enum:
        - Off
        - Enabling
        - Canary
        - Enabled
        - Disabling
      description: Current state of a feature-flag rollout.
    NextAction:
      type: object
      properties:
        verb:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
        href:
          type: string
        description:
          type: string
      required:
        - verb
        - href
        - description
      additionalProperties: false
    Post:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/PostId"
        community_id:
          $ref: "#/components/schemas/CommunityId"
        author_id:
          $ref: "#/components/schemas/UserId"
        title:
          type: string
          minLength: 1
          maxLength: 300
          pattern: ^[^\x00]*$
        body:
          type: string
          maxLength: 40000
          pattern: ^[^\x00]*$
        score:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        created_at:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - id
        - community_id
        - author_id
        - title
        - body
        - score
        - created_at
      additionalProperties: false
      description: A post within a community.
    PostId:
      type: string
      pattern: ^post_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: post_<ULID>"
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          description: Absolute URI identifying the problem type.
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        retryable:
          type: boolean
        next_actions:
          type: array
          items:
            $ref: "#/components/schemas/NextAction"
        failure_domain:
          $ref: "#/components/schemas/FailureDomain"
      required:
        - type
        - title
        - status
        - retryable
        - next_actions
        - failure_domain
      additionalProperties: false
      description: RFC 7807 Problem Details with QARoom agent extensions.
    SystemLimits:
      type: object
      properties:
        service:
          type: string
        principal:
          type: string
        limit:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        remaining:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        reset_in_seconds:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - principal
        - limit
        - remaining
        - reset_in_seconds
        - as_of
      additionalProperties: false
      description: Per-principal rate-limit usage and time to full refill.
    SystemState:
      type: object
      properties:
        service:
          type: string
        models:
          type: object
          additionalProperties: {}
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - models
        - as_of
      additionalProperties: false
      description: Current observable state of every model the service runs.
    UserId:
      type: string
      pattern: ^user_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: user_<ULID>"
    VoteValue:
      anyOf:
        - type: number
          enum:
            - 1
        - type: number
          enum:
            - -1
      description: "Vote direction: 1 (up) or -1 (down)."
    WsEnvelope:
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - flag.state.changed
            seq:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            community_id:
              $ref: "#/components/schemas/CommunityId"
            occurred_at:
              type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
            flag_key:
              $ref: "#/components/schemas/FlagKey"
            state:
              $ref: "#/components/schemas/FlagState"
