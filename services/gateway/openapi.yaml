                flag_key: donations
                state: Enabled
                enabled: true
                as_of:
                  snapshot_id: snap_01HZY0K7M3QF8VN2J5RX9TB4CL
                  lamport: 7
                  wall_clock: 2026-05-28T12:00:00.000Z
          links:
            ResolveAdvancedFlag:
              operationId: resolveFlag
              parameters:
                communityId: $response.body#/community_id
                flagKey: $response.body#/flag_key
