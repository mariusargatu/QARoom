                next_actions: []
                failure_domain: rate_limit
        "502":
          description: flags-service is unreachable or timed out.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/flags-unreachable
                title: Upstream flags-service unavailable
                status: 502
                detail: Upstream flags-service unavailable.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: dependency_failure
      tags:
        - flags
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: flagKey
          in: path
