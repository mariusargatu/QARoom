                status: 429
                detail: Too many requests.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: rate_limit
        "502":
          description: donations-service is unreachable, timed out, or the gateway circuit breaker is open (chaos experiments 06/07). The upstream payment-provider 502 is also surfaced here.
          content:
            application/problem+json:
              schema:
