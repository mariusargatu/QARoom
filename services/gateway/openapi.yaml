  /api/communities/{communityId}/flags/{flagKey}/rollout:
    post:
      operationId: advanceRollout
      summary: Advance a flag rollout (proxied)
      description: Applies one rollout event (e.g. EnableRequested). Idempotent on Idempotency-Key; an event illegal from the current state returns 409.
      responses:
        "200":
          description: The flag after the transition.
          content:
