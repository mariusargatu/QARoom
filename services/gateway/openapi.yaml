openapi: 3.0.3
info:
  title: QARoom gateway
  version: 0.0.0
  description: External API gateway fronting content-, donations-, and flags-service. Generated from Zod — do not edit by hand.
paths:
  /api/communities/{communityId}/posts:
    post:
      operationId: createPost
      summary: Create a post (proxied to content-service)
      description: Validates at the edge, forwards to content-service. Idempotent on the Idempotency-Key header.
      responses:
        "201":
          description: The created post.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
              example:
                id: post_01HZY0K7M3QF8VN2J5RX9TB4CE
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                author_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
                title: Why deterministic clocks matter
                body: A short note on testability.
                score: 0
                created_at: 2026-05-28T12:00:00.000Z
          links:
            GetCreatedPost:
              operationId: getPost
              parameters:
                postId: $response.body#/id
              description: Fetch the post that was just created.
        "400":
          description: The request failed validation at the gateway edge.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: false
                next_actions: []
                failure_domain: validation
        "429":
          description: The per-principal rate limit was exceeded. Carries a Retry-After header.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/rate-limited
                title: Too many requests
                status: 429
                detail: Too many requests.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: rate_limit
        "502":
          description: content-service is unreachable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/content-unreachable
                title: Upstream content-service unavailable
                status: 502
                detail: Upstream content-service unavailable.
                instance: /api/posts/post_01HZY0K7M3QF8VN2J5RX9TB4CE
                retryable: true
                next_actions: []
                failure_domain: dependency_failure
      tags:
        - posts
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
            example:
              author_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
              title: Why deterministic clocks matter
              body: A short note on testability.
