  /api/communities/{communityId}/donations:
    post:
      operationId: createDonation
      summary: Create a donation (proxied to donations-service)
      description: Validates at the edge, forwards to donations-service. Gated by the donations flag and settled via the payment provider. Idempotent on Idempotency-Key. The gateway circuit breaker fails fast with a 502 when donations is sick (experiment 06).
      responses:
        "201":
          description: The recorded donation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"
              example:
                id: dntn_01HZY0K7M3QF8VN2J5RX9TB4CJ
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                donor_id: user_01HZY0K7M3QF8VN2J5RX9TB4CF
                amount_cents: 2500
                currency: USD
                status: Captured
                created_at: "2026-05-28T12:00:00.000Z"
                updated_at: "2026-05-28T12:00:00.000Z"
          links:
            GetCreatedDonation:
              operationId: getDonation
              parameters:
                communityId: $response.body#/community_id
                donationId: $response.body#/id
              description: Fetch the donation that was just created.
