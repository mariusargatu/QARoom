        "200":
          description: Current rate-limit usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemLimits"
      tags:
        - system
components:
  schemas:
    AdvanceRolloutRequest:
      type: object
      properties:
        event:
          $ref: "#/components/schemas/RolloutEventName"
      required:
        - event
      additionalProperties: false
      description: "Body for advanceRollout: the rollout event to apply."
    AsOf:
      type: object
      properties:
        snapshot_id:
          type: string
        lamport:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        wall_clock:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - snapshot_id
        - lamport
        - wall_clock
      additionalProperties: false
      description: "Read consistency envelope: {snapshot_id, lamport, wall_clock}."
    Capabilities:
      type: object
      properties:
        service:
          type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/Capability"
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - capabilities
        - as_of
      additionalProperties: false
      description: All operations the service exposes, MCP-tool-shaped.
    Capability:
      type: object
      properties:
        operation_id:
          type: string
        method:
          type: string
        path:
          type: string
        summary:
          type: string
        description:
          type: string
        mutating:
          type: boolean
        input_schema:
          type: object
          additionalProperties: {}
      required:
        - operation_id
        - method
        - path
        - summary
        - description
        - mutating
        - input_schema
      additionalProperties: false
      description: An MCP-tool-shaped description of one operation.
    CastVoteRequest:
      type: object
      properties:
        voter_id:
          $ref: "#/components/schemas/UserId"
        value:
          $ref: "#/components/schemas/VoteValue"
