name: qaroom-donations

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: qaroom
      POSTGRES_PASSWORD: qaroom
      POSTGRES_DB: qaroom_donations
    ports:
      - '5435:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qaroom -d qaroom_donations']
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - qaroom_donations_pg:/var/lib/postgresql

volumes:
  qaroom_donations_pg:
