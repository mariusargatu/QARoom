asyncapi: 3.0.0
info:
  title: content-service events (fixture)
  version: 1.0.0
channels:
  postCreated:
    address: qaroom.content.posts.{community_id}.created
    parameters:
      community_id:
        description: The community (tenant) id.
    messages:
      PostCreatedEvent:
        $ref: "#/components/messages/PostCreatedEvent"
operations:
  publishPostCreated:
    action: send
    channel:
      $ref: "#/channels/postCreated"
    messages:
      - $ref: "#/channels/postCreated/messages/PostCreatedEvent"
components:
  messages:
    PostCreatedEvent:
      name: PostCreatedEvent
      payload:
        $ref: "#/components/schemas/PostCreatedEvent"
  schemas:
    PostCreatedEvent:
      type: object
      properties:
        event_id:
          type: string
        post_id:
          type: string
        community_id:
          type: string
      required:
        - event_id
        - post_id
        - community_id
      additionalProperties: false
