openapi: 3.0.3
info:
  title: oasdiff gate fixture
  version: 1.0.0
paths:
  /widgets/{id}:
    get:
      operationId: getWidget
      summary: Get a widget
      description: Returns a widget by id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The widget.
          content:
            application/json:
              schema:
                type: object
                required: [id, name]
                properties:
                  id:
                    type: string
                  name:
                    type: string
