name: qaroom-content

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: qaroom
      POSTGRES_PASSWORD: qaroom
      POSTGRES_DB: qaroom_content
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qaroom -d qaroom_content']
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - qaroom_content_pg:/var/lib/postgresql/data

volumes:
  qaroom_content_pg:
