# QARoom moderator golden-set evals (Milestone 9, ADR-0017).
#
# Runs the REAL moderation prompt (generated from the service's prompt builder + committed rules,
# drift-gated) against OpenAI. The test cases are the SME-LABELLED gold set: candidates labelled by
# three independent SME-persona raters, gated to the cases with unanimous agreement (Fleiss' Kappa;
# `golden/gold.json` holds the full agreement report; split cases are kept as `ambiguous`, not eval
# gold). The cases live in `golden/promptfoo-tests.yaml`, generated by `golden:build`.
#
# This golden eval deliberately does NOT catch a paraphrase-sensitivity regression — that is the job
# of the metamorphic test (tests/test_metamorphic.py). The pair is the whole point of ADR-0017.
#
# Cost: gated by `eval:cost` (pre-flight token estimate vs MODERATOR_EVAL_BUDGET_TOKENS) and only run
# when OPENAI_API_KEY is present (decision: roadmap-literal real-OpenAI evals).
description: QARoom moderator golden-set evals

prompts:
  - file://moderation.prompt.json

providers:
  # gpt-5.5 is a reasoning model — no temperature/seed (use reasoning effort). Structured output via
  # json_object + the is-json / verdict asserts. Swap the provider id to compare models (ADR-0017).
  - id: openai:chat:gpt-5.5-2026-04-23
    config:
      reasoning_effort: low
      response_format:
        type: json_object

defaultTest:
  assert:
    - type: is-json

# The SME-gold cases (unanimous) + the adversarial injection case. Regenerate with `golden:build`.
tests: file://golden/promptfoo-tests.yaml
