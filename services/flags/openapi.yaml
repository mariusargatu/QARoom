openapi: 3.0.3
info:
  title: QARoom flags-service
  version: 0.0.0
  description: Per-community feature-flag resolution and rollout. Generated from Zod — do not edit by hand.
paths:
  /api/communities/{communityId}/flags/{flagKey}:
    get:
      operationId: resolveFlag
      summary: Resolve a feature flag for a community
      description: Returns the flag’s current rollout state and the gating boolean, with a read envelope.
      responses:
        "200":
          description: The resolved flag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagResolution"
              example:
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                flag_key: donations
                state: Enabled
                enabled: true
                as_of:
                  snapshot_id: snap_01HZY0K7M3QF8VN2J5RX9TB4CL
                  lamport: 7
                  wall_clock: 2026-05-28T12:00:00.000Z
        "400":
          description: The community id or flag key in the path is malformed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/flags/donations
                retryable: false
                next_actions: []
                failure_domain: validation
      tags:
        - flags
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: flagKey
          in: path
          required: true
          description: Feature-flag key (lowercase, hyphen-separated slug).
          schema:
            type: string
            pattern: ^[a-z][a-z0-9-]{1,63}$
  /api/communities/{communityId}/flags:
    get:
      operationId: listFlags
      summary: List all flags for a community
      description: Returns every flag resolved for the community, with a read envelope.
      responses:
        "200":
          description: The resolved flags.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagList"
              example:
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                flags:
                  - community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                    flag_key: donations
                    state: Enabled
                    enabled: true
                    as_of:
                      snapshot_id: snap_01HZY0K7M3QF8VN2J5RX9TB4CL
                      lamport: 7
                      wall_clock: 2026-05-28T12:00:00.000Z
                as_of:
                  snapshot_id: snap_01HZY0K7M3QF8VN2J5RX9TB4CL
                  lamport: 7
                  wall_clock: 2026-05-28T12:00:00.000Z
        "400":
          description: The community id in the path is malformed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/flags/donations
                retryable: false
                next_actions: []
                failure_domain: validation
      tags:
        - flags
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
  /api/communities/{communityId}/flags/{flagKey}/rollout:
    post:
      operationId: advanceRollout
      summary: Advance a flag rollout
      description: Applies one rollout event (e.g. EnableRequested). Idempotent on Idempotency-Key; an event illegal from the current state returns 409.
      responses:
        "200":
          description: The flag after the transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagResolution"
              example:
                community_id: comm_01HZY0K7M3QF8VN2J5RX9TB4CD
                flag_key: donations
                state: Enabled
                enabled: true
                as_of:
                  snapshot_id: snap_01HZY0K7M3QF8VN2J5RX9TB4CL
                  lamport: 7
                  wall_clock: 2026-05-28T12:00:00.000Z
          links:
            ResolveFlag:
              operationId: resolveFlag
              parameters:
                communityId: $response.body#/community_id
                flagKey: $response.body#/flag_key
              description: Re-resolve the flag that was just advanced.
        "400":
          description: The request body or headers failed validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/validation-failed
                title: Request failed validation
                status: 400
                detail: Request failed validation.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/flags/donations
                retryable: false
                next_actions: []
                failure_domain: validation
        "409":
          description: The requested event is not a legal transition from the flag’s current state.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: https://qaroom.dev/errors/rollout-transition-illegal
                title: Illegal rollout transition
                status: 409
                detail: Illegal rollout transition.
                instance: /api/communities/comm_01HZY0K7M3QF8VN2J5RX9TB4CD/flags/donations
                retryable: false
                next_actions: []
                failure_domain: conflict
      tags:
        - flags
      parameters:
        - name: communityId
          in: path
          required: true
          description: Target community (tenant).
          schema:
            type: string
            pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
        - name: flagKey
          in: path
          required: true
          description: Feature-flag key (lowercase, hyphen-separated slug).
          schema:
            type: string
            pattern: ^[a-z][a-z0-9-]{1,63}$
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-supplied key making this mutation safely retryable (Commitment 4).
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceRolloutRequest"
            example:
              event: EnableRequested
  /system/state:
    get:
      operationId: getSystemState
      summary: Observable state of every model
      description: Returns the current state of every model the service runs, with an as_of envelope (Commitment 7).
      responses:
        "200":
          description: Current observable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemState"
      tags:
        - system
  /system/capabilities:
    get:
      operationId: getSystemCapabilities
      summary: Operations the service exposes
      description: Returns every operation in MCP-tool-shaped form (Commitment 7).
      responses:
        "200":
          description: The capability list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
      tags:
        - system
components:
  schemas:
    AdvanceRolloutRequest:
      type: object
      properties:
        event:
          $ref: "#/components/schemas/RolloutEventName"
      required:
        - event
      additionalProperties: false
      description: "Body for advanceRollout: the rollout event to apply."
    AsOf:
      type: object
      properties:
        snapshot_id:
          type: string
        lamport:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        wall_clock:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - snapshot_id
        - lamport
        - wall_clock
      additionalProperties: false
      description: "Read consistency envelope: {snapshot_id, lamport, wall_clock}."
    Capabilities:
      type: object
      properties:
        service:
          type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/Capability"
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - capabilities
        - as_of
      additionalProperties: false
      description: All operations the service exposes, MCP-tool-shaped.
    Capability:
      type: object
      properties:
        operation_id:
          type: string
        method:
          type: string
        path:
          type: string
        summary:
          type: string
        description:
          type: string
        mutating:
          type: boolean
        input_schema:
          type: object
          additionalProperties: {}
      required:
        - operation_id
        - method
        - path
        - summary
        - description
        - mutating
        - input_schema
      additionalProperties: false
      description: An MCP-tool-shaped description of one operation.
    CommunityId:
      type: string
      pattern: ^comm_[0-9A-HJKMNP-TV-Z]{26}$
      description: "Branded identifier: comm_<ULID>"
    FailureDomain:
      type: string
      enum:
        - validation
        - authentication
        - authorization
        - tenant_resolution
        - rate_limit
        - conflict
        - not_found
        - dependency_failure
        - internal_error
    FlagKey:
      type: string
      pattern: ^[a-z][a-z0-9-]{1,63}$
      description: A lowercase, hyphen-separated feature-flag key.
    FlagList:
      type: object
      properties:
        community_id:
          $ref: "#/components/schemas/CommunityId"
        flags:
          type: array
          items:
            $ref: "#/components/schemas/FlagResolution"
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - community_id
        - flags
        - as_of
      additionalProperties: false
      description: All resolved flags for a community.
    FlagResolution:
      type: object
      properties:
        community_id:
          $ref: "#/components/schemas/CommunityId"
        flag_key:
          $ref: "#/components/schemas/FlagKey"
        state:
          $ref: "#/components/schemas/FlagState"
        enabled:
          type: boolean
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - community_id
        - flag_key
        - state
        - enabled
        - as_of
      additionalProperties: false
      description: Resolved feature-flag value for a community.
    FlagState:
      type: string
      enum:
        - Off
        - Enabling
        - Canary
        - Enabled
        - Disabling
      description: Current state of a feature-flag rollout.
    NextAction:
      type: object
      properties:
        verb:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
        href:
          type: string
        description:
          type: string
      required:
        - verb
        - href
        - description
      additionalProperties: false
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          description: Absolute URI identifying the problem type.
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        retryable:
          type: boolean
        next_actions:
          type: array
          items:
            $ref: "#/components/schemas/NextAction"
        failure_domain:
          $ref: "#/components/schemas/FailureDomain"
      required:
        - type
        - title
        - status
        - retryable
        - next_actions
        - failure_domain
      additionalProperties: false
      description: RFC 7807 Problem Details with QARoom agent extensions.
    RolloutEventName:
      type: string
      enum:
        - EnableRequested
        - CanaryConfirmed
        - RolloutCompleted
        - DisableRequested
        - DisableCompleted
        - RolloutAborted
      description: A rollout state-machine event a client may request.
    SystemState:
      type: object
      properties:
        service:
          type: string
        models:
          type: object
          additionalProperties: {}
        as_of:
          $ref: "#/components/schemas/AsOf"
      required:
        - service
        - models
        - as_of
      additionalProperties: false
      description: Current observable state of every model the service runs.
servers:
  - url: http://localhost:8083
    description: local docker-compose
