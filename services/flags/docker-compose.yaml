name: qaroom-flags

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: qaroom
      POSTGRES_PASSWORD: qaroom
      POSTGRES_DB: qaroom_flags
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qaroom -d qaroom_flags']
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - qaroom_flags_pg:/var/lib/postgresql

volumes:
  qaroom_flags_pg:
